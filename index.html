<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>TutorApp</title>
<meta name="description" content="Управление репетиторством: расписание, ученики, финансы"/>
<meta name="theme-color" content="#0a0a0a"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='24' fill='%230a0a0a'/><text x='96' y='140' text-anchor='middle' font-size='120' font-family='sans-serif' font-weight='900' fill='%23FFE500'>T</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Unbounded:wght@400;700;900&family=Martian+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  color-scheme: light;
  --black: #0a0a0a;
  --white: #f5f0e8;
  --yellow: #FFE500;
  --red: #FF2D2D;
  --green: #00C853;
  --blue: #0057FF;
  --border: 2.5px solid var(--black);
  --shadow: 4px 4px 0px var(--black);
  --shadow-lg: 6px 6px 0px var(--black);
  --text-sec: #666;
  --text-muted: #999;
  --bg-subtle: #fffde0;
  --bg-danger: #fff5f5;
  --bg-success: #e8ffe8;
  --border-light: #e0e0e0;
  --border-dashed: #ccc;
  --done-bg: #ddd;
  --done-text: #555;
}
body[data-theme="dark"] {
  color-scheme: dark;
  --black: #eee6d8;
  --white: #171716;
  --yellow: #ffe66b;
  --red: #ff4b4b;
  --green: #35d071;
  --blue: #4f83ff;
  --border: 2px solid rgba(238,230,216,.78);
  --shadow: 3px 3px 0px rgba(238,230,216,.28);
  --shadow-lg: 4px 4px 0px rgba(238,230,216,.34);
  --text-sec: #9b9488;
  --text-muted: #6b665d;
  --bg-subtle: #1a1908;
  --bg-danger: #1a0808;
  --bg-success: #102a16;
  --border-light: #2a2720;
  --border-dashed: #3a3530;
  --done-bg: #2a2720;
  --done-text: #8a8580;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Inter', 'Martian Mono', sans-serif;
  background: var(--white);
  color: var(--black);
  min-height: 100dvh;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
}
body[data-theme="dark"] {
  background: #0b0b0a;
  color: #eee6d8;
}
h1,h2,h3,.heading { font-family: 'Unbounded', cursive; }

/* NAV BAR */
.navbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; background: var(--black);
  z-index: 100; border-top: var(--border);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 10px 4px 14px;
  color: #888; border: none; background: none; cursor: pointer;
  font-family: 'Martian Mono', monospace; font-size: 9px;
  gap: 4px; transition: color .15s;
  border-right: 1px solid #222;
}
.nav-btn:last-child { border-right: none; }
.nav-btn.active { color: var(--yellow); }
.nav-btn svg { width: 22px; height: 22px; stroke-width: 2px; }
body[data-theme="dark"] .navbar { background: #11110f; border-top-color: rgba(238,230,216,.6); }
body[data-theme="dark"] .nav-btn { color: #7d786f; border-right-color: #27241f; }
body[data-theme="dark"] .nav-btn.active { color: var(--yellow); }

/* MAIN */
.main { padding: 16px 16px 90px; max-width: 480px; margin: 0 auto; transition: opacity .2s ease; }

/* CARDS */
.card {
  background: var(--white);
  border: var(--border);
  box-shadow: var(--shadow);
  border-radius: 4px;
  margin-bottom: 12px;
}
.card-header {
  background: var(--black); color: var(--yellow);
  font-family: 'Unbounded', cursive; font-size: 11px;
  padding: 8px 12px; letter-spacing: .05em; text-transform: uppercase;
}

/* LESSON CARD */
.lesson-card {
  display: flex; align-items: stretch;
  border: var(--border); box-shadow: var(--shadow);
  border-radius: 4px; margin-bottom: 10px;
  background: var(--white); overflow: hidden;
  cursor: pointer; transition: transform .1s, box-shadow .1s;
}
.lesson-card:active { transform: translate(4px,4px); box-shadow: 0 0 0 var(--black); }
.lesson-time {
  min-width: 62px; display: flex; flex-direction: column; align-items: center;
  justify-content: center; background: var(--black); color: var(--yellow);
  font-family: 'Unbounded', cursive; font-size: 14px; font-weight: 700;
  padding: 12px 8px; line-height: 1.2;
}
.lesson-body { flex: 1; padding: 10px 12px; display: flex; flex-direction: column; gap: 4px; }
.lesson-name { font-family: 'Unbounded', cursive; font-size: 12px; font-weight: 700; line-height: 1.3; }
.lesson-tag {
  display: inline-block; font-size: 9px; font-weight: 700;
  padding: 2px 6px; border: 1.5px solid var(--black);
  border-radius: 2px; text-transform: uppercase; letter-spacing: .05em;
}
.lesson-actions { display: flex; align-items: center; padding: 0 8px; gap: 6px; }

/* BUTTONS */
.btn {
  font-family: 'Unbounded', cursive; font-weight: 700;
  border: var(--border); box-shadow: var(--shadow);
  border-radius: 4px; cursor: pointer; transition: transform .1s, box-shadow .1s;
  font-size: 12px; padding: 10px 16px; background: var(--yellow); color: var(--black);
  display: inline-flex; align-items: center; gap: 6px;
}
.btn:active { transform: translate(4px,4px); box-shadow: 0 0 0; }
.btn-sm { font-size: 10px; padding: 6px 10px; box-shadow: 3px 3px 0 var(--black); }
.btn-sm:active { transform: translate(3px,3px); box-shadow: 0 0 0; }
.btn-red { background: var(--red); color: var(--white); }
.btn-green { background: var(--green); color: var(--black); }
.btn-black { background: var(--black); color: var(--yellow); }
.btn-white { background: var(--white); color: var(--black); }
.btn-blue { background: var(--blue); color: var(--white); }
.btn-full { width: 100%; justify-content: center; }
body[data-theme="dark"] .btn { box-shadow: 3px 3px 0 rgba(238,230,216,.26); }
body[data-theme="dark"] .btn-blue { background:#4f83ff; color:#fff; }
body[data-theme="dark"] .btn-red { background:#ff4b4b; color:#fff; }
body[data-theme="dark"] .btn-green { background:#35d071; color:#071109; }
body[data-theme="dark"] .btn-white { background:#211f1b; color:#eee6d8; }
body[data-theme="dark"] .btn-black { background:#eee6d8; color:#11110f; }

/* FAB */
.fab {
  position: fixed; right: 16px; bottom: 76px;
  width: 56px; height: 56px; border-radius: 4px;
  background: var(--yellow); border: var(--border);
  box-shadow: var(--shadow-lg); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 99; transition: transform .1s, box-shadow .1s;
}
.fab:active { transform: translate(6px,6px); box-shadow: 0 0 0; }
.fab svg { width: 28px; height: 28px; stroke: var(--black); stroke-width: 2.5; }

/* BADGE */
.badge {
  display: inline-flex; align-items: center; justify-content: center;
  font-family: 'Unbounded', cursive; font-size: 9px; font-weight: 900;
  min-width: 20px; height: 20px; padding: 0 5px;
  border: 1.5px solid var(--black); border-radius: 2px;
}
.badge-red { background: var(--red); color: var(--white); }
.badge-green { background: var(--green); color: var(--black); }
.badge-yellow { background: var(--yellow); color: var(--black); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  z-index: 200; display: flex; align-items: flex-end; justify-content: center;
}
.modal {
  background: var(--white); border-top: 3px solid var(--black);
  border-left: var(--border); border-right: var(--border);
  width: 100%; max-width: 480px; border-radius: 4px 4px 0 0;
  max-height: 90dvh; overflow-y: auto; padding: 20px 16px 32px;
}
.modal-title {
  font-family: 'Unbounded', cursive; font-size: 16px; font-weight: 900;
  margin-bottom: 16px; padding-bottom: 12px; border-bottom: var(--border);
}

/* INPUTS */
.input {
  width: 100%; font-family: 'Martian Mono', monospace; font-size: 14px;
  border: var(--border); border-radius: 4px; padding: 10px 12px;
  background: var(--white); color: var(--black); outline: none;
  box-shadow: 3px 3px 0 var(--black);
}
.input:focus { background: #fffde0; }
body[data-theme="dark"] .input:focus { background: #191919; }
body[data-theme="dark"] .label,
body[data-theme="dark"] .stat-label,
body[data-theme="dark"] [style*="color:'#666'"],
body[data-theme="dark"] [style*="color:#666"],
body[data-theme="dark"] [style*="color: '#666'"] {
  color: #9b9488 !important;
}
.label {
  font-family: 'Unbounded', cursive; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .05em;
  display: block; margin-bottom: 6px;
}

/* STAT CARDS */
.stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat-card {
  border: var(--border); box-shadow: var(--shadow); border-radius: 4px;
  padding: 12px; background: var(--white);
}
.stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: .05em; color: #666; margin-bottom: 4px; }
.stat-value { font-family: 'Unbounded', cursive; font-size: 22px; font-weight: 900; line-height: 1; }

/* PAGE TITLE */
.page-title {
  font-family: 'Unbounded', cursive; font-size: 22px; font-weight: 900;
  margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between;
}

/* DAY SELECTOR */
.day-strip { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
.day-strip::-webkit-scrollbar { display: none; }
.day-btn {
  min-width: 52px; flex-shrink: 0; display: flex; flex-direction: column;
  align-items: center; padding: 8px 4px; border: var(--border);
  border-radius: 4px; cursor: pointer; background: var(--white);
  font-family: 'Unbounded', cursive; transition: transform .1s, box-shadow .1s;
  box-shadow: 3px 3px 0 var(--black);
}
.day-btn.active { background: var(--black); color: var(--yellow); }
.day-btn:active { transform: translate(3px,3px); box-shadow: 0 0 0; }
.day-btn-name { font-size: 10px; font-weight: 700; }
.day-btn-date { font-size: 14px; font-weight: 900; }
.day-btn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); margin-top: 3px; }

/* STUDENT LIST ITEM */
.student-item {
  border: var(--border); box-shadow: var(--shadow); border-radius: 4px;
  padding: 12px; margin-bottom: 10px; background: var(--white);
  display: flex; align-items: center; justify-content: space-between;
}

/* TOGGLE */
.toggle-row { display: flex; gap: 0; border: var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 12px; }
.toggle-opt {
  flex: 1; padding: 8px; text-align: center; cursor: pointer;
  font-family: 'Unbounded', cursive; font-size: 10px; font-weight: 700;
  border: none; background: var(--white); border-right: var(--border);
  transition: background .1s;
}
.toggle-opt:last-child { border-right: none; }
.toggle-opt.active { background: var(--black); color: var(--yellow); }

/* CHECKBOX */
.check-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px; border: var(--border); border-radius: 4px;
  margin-bottom: 8px; cursor: pointer; background: var(--white);
  box-shadow: 3px 3px 0 var(--black);
}
.check-row.checked { background: #e8ffe8; }
body[data-theme="dark"] .check-row.checked { background: #102a16; }
.check-box {
  width: 24px; height: 24px; border: var(--border); border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  background: var(--white); flex-shrink: 0;
}
.check-box.checked { background: var(--green); }

.theme-toggle {
  min-width: 42px; height: 36px; padding: 0;
  justify-content: center;
}
body[data-theme="dark"] .card,
body[data-theme="dark"] .lesson-card,
body[data-theme="dark"] .stat-card,
body[data-theme="dark"] .student-item,
body[data-theme="dark"] .modal,
body[data-theme="dark"] .input,
body[data-theme="dark"] .toggle-opt,
body[data-theme="dark"] .check-row,
body[data-theme="dark"] .check-box,
body[data-theme="dark"] .day-btn {
  background: #171716;
  color: #eee6d8;
}
body[data-theme="dark"] .lesson-time,
body[data-theme="dark"] .card-header,
body[data-theme="dark"] .toggle-opt.active,
body[data-theme="dark"] .day-btn.active {
  background: #eee6d8;
  color: #11110f;
}
body[data-theme="dark"] .lesson-tag,
body[data-theme="dark"] .badge {
  border-color: rgba(238,230,216,.82);
}
body[data-theme="dark"] .lesson-card,
body[data-theme="dark"] .card,
body[data-theme="dark"] .stat-card,
body[data-theme="dark"] .student-item {
  box-shadow: 3px 3px 0 rgba(238,230,216,.22);
}
body[data-theme="dark"] .modal {
  background: #161514;
  border-color: rgba(238,230,216,.75);
}
body[data-theme="dark"] .modal-overlay {
  background: rgba(0,0,0,.72);
}
body[data-theme="dark"] .input,
body[data-theme="dark"] .check-box {
  background: #100f0e;
}
body[data-theme="dark"] .toggle-row {
  border-color: rgba(238,230,216,.7);
}
body[data-theme="dark"] .fab {
  border-color: rgba(238,230,216,.85);
}
body[data-theme="dark"] .badge-red {
  background:#ff4b4b;
  color:#140404;
}
body[data-theme="dark"] .badge-green {
  background:#35d071;
  color:#071109;
}
body[data-theme="dark"] .badge-yellow {
  background:#ffe66b;
  color:#15120a;
}

@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin 1s linear infinite; }
@keyframes slideDown { from { transform:translateX(-50%) translateY(-80px); opacity:0; } to { transform:translateX(-50%) translateY(0); opacity:1; } }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes modalPop { from { opacity:0; transform:scale(.96); } to { opacity:1; transform:scale(1); } }
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,200,83,.4)} 50%{box-shadow:0 0 0 10px rgba(0,200,83,0)} }
@keyframes fabPop { from{transform:scale(0) translateY(20px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }
.anim-in { animation: fadeIn .25s ease both; }
.anim-stagger-1 { animation-delay:.03s }
.anim-stagger-2 { animation-delay:.06s }
.anim-stagger-3 { animation-delay:.09s }
.anim-stagger-4 { animation-delay:.12s }
.anim-stagger-5 { animation-delay:.15s }
.timer-pulse { animation: pulse 2s infinite; }

/* ── RESPONSIVE: PC ── */
@media(min-width:769px){
  .navbar{position:fixed;top:0;bottom:auto;left:0;right:0;border-top:none;border-bottom:var(--border);justify-content:center;gap:0}
  .nav-btn{flex:0 0 auto;padding:14px 32px;flex-direction:row;gap:8px;font-size:11px}
  .nav-btn svg{width:18px;height:18px}
  .main{max-width:1200px;padding:76px 32px 32px}
  .fab{bottom:32px;right:32px}
  .modal-overlay{align-items:center}
  .modal{max-width:560px;border-radius:8px;border:var(--border);max-height:85vh;animation:modalPop .2s ease}
  .stat-row{grid-template-columns:repeat(4,1fr)}
  .lesson-card .lesson-actions button:not(.btn){opacity:0;transition:opacity .15s}
  .lesson-card:hover .lesson-actions button{opacity:1}
}
@media(min-width:1025px){
  .main{max-width:1400px}
}

/* ── RESPONSIVE: MOBILE ── */
@media(max-width:768px){
  .sched-desktop{display:none!important}
  .sched-mobile{display:block!important}
  .btn-sm{min-height:40px;padding:10px 12px}
  .today-desktop-grid{display:block!important}
}
@media(min-width:769px){
  .sched-mobile{display:none!important}
  .sched-desktop{display:block!important}
  .today-desktop-grid{display:grid!important;grid-template-columns:3fr 2fr;gap:24px;align-items:start}
}

/* ── FAB EXPANDED ── */
.fab-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:97}
.fab-menu{position:fixed;right:16px;bottom:140px;display:flex;flex-direction:column;gap:10px;z-index:98}
@media(min-width:769px){.fab-menu{bottom:96px;right:32px}}
.fab-item{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:4px;border:var(--border);box-shadow:var(--shadow);cursor:pointer;font-family:'Unbounded',cursive;font-size:11px;font-weight:700;white-space:nowrap}
.fab-item:nth-child(1){animation:fabPop .2s ease both;animation-delay:.0s}
.fab-item:nth-child(2){animation:fabPop .2s ease both;animation-delay:.05s}
.fab-item:nth-child(3){animation:fabPop .2s ease both;animation-delay:.1s}
.fab-item:nth-child(4){animation:fabPop .2s ease both;animation-delay:.15s}

/* ── TIMER BANNER ── */
.timer-banner{border:var(--border);border-radius:4px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;background:var(--green);box-shadow:var(--shadow)}
.timer-bar{height:6px;background:rgba(0,0,0,.15);border-radius:3px;flex:1;overflow:hidden}
.timer-fill{height:100%;background:var(--black);border-radius:3px;transition:width 1s linear}

/* ── GLOBAL SEARCH ── */
.search-overlay{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.5)}
.search-panel{position:fixed;top:0;left:0;right:0;z-index:251;background:var(--white);border-bottom:var(--border);padding:12px 16px;box-shadow:var(--shadow-lg)}
@media(min-width:769px){.search-panel{left:50%;right:auto;transform:translateX(-50%);width:600px;top:8px;border-radius:8px;border:var(--border)}}
.search-result{padding:10px 12px;border-bottom:1px solid var(--border-light);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .1s}
.search-result:hover{background:var(--bg-subtle)}

/* ── NOTIFICATION ── */
.notif-dot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:50%;background:var(--red);border:2px solid var(--white)}

/* ── SWIPE SCHEDULE ── */
.sched-swipe{touch-action:pan-y;overflow:hidden}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// ── UTILS ──────────────────────────────────────────────────────────────────────
const localDateString = (d = new Date()) =>
  `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const getTodayDate = () => localDateString();
const todayObj = new Date();
const currentDay = todayObj.getDay() || 7;
const getDayDate = (target) => {
  const d = new Date(todayObj);
  d.setDate(todayObj.getDate() - currentDay + target);
  return localDateString(d);
};
const fmtDate = (str) => {
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
};
const DAYS_SHORT = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
const DAY_INDEXES = [1,2,3,4,5,6,0];
const MONTH_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const SUBJECTS = ['История','Общество','Русский','Математика','Английский','Другое'];
const inferSubject = (text='') => {
  const t = text.toLowerCase();
  if (t.includes('обществ')) return 'Общество';
  if (t.includes('истор')) return 'История';
  if (t.includes('рус')) return 'Русский';
  if (t.includes('мат')) return 'Математика';
  if (t.includes('англ')) return 'Английский';
  return 'История';
};
const subjectColor = (subject) => ({
  'История':'#0057FF',
  'Общество':'#FFE500',
  'Русский':'#FF2D2D',
  'Математика':'#00C853',
  'Английский':'#8A2BE2',
  'Другое':'#777',
}[subject] || '#777');

// ── AUTO-COMPLETE ──────────────────────────────────────────────────────────────
const runAutoCompletion = (cls, cst, cg, ctx) => {
  let updated = false;
  const now = new Date();
  let newL = [...cls], newS = [...cst], newT = [...ctx];
  newL = newL.map(lesson => {
    const end = new Date(`${lesson.date}T${lesson.time}`);
    end.setHours(end.getHours() + 1);
    if (lesson.status === 'planned' && end <= now) {
      updated = true;
      const grp = lesson.type === 'group' ? cg.find(g => g.id === lesson.targetId) : null;
      const lsStudents = lesson.type === 'individual'
        ? [newS.find(s => s.id === lesson.targetId)].filter(Boolean)
        : (grp?.studentIds.map(id => newS.find(s => s.id === id)).filter(Boolean) || []);
      const billableStudents = lsStudents.filter(s => !s.archived);
      const att = {};
      billableStudents.forEach(s => {
        att[s.id] = true;
        const rate = grp?.rateOverrides?.[s.id] ?? s.rate;
        newT.push({ id: Date.now()+Math.random(), studentId: s.id, type:'charge', amount: rate, date: getTodayDate(), comment:`Авто: ${fmtDate(lesson.date)}`, lessonId: lesson.id });
        const i = newS.findIndex(st => st.id === s.id);
        if (i > -1) newS[i] = { ...newS[i], balance: newS[i].balance - rate };
      });
      return { ...lesson, status:'completed', attendance: att };
    }
    return lesson;
  });
  return updated ? { newLessons: newL, newStudents: newS, newTransactions: newT } : null;
};

// ── SWIPE HOOK ─────────────────────────────────────────────────────────────────
const useSwipe = (onLeft, onRight, threshold=60) => {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    let sx=0, sy=0;
    const ts = e => { sx=e.touches[0].clientX; sy=e.touches[0].clientY; };
    const te = e => {
      const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
      if (Math.abs(dx)>threshold && Math.abs(dy)<Math.abs(dx)*0.6) {
        if (dx<0 && onLeft) onLeft();
        if (dx>0 && onRight) onRight();
      }
    };
    el.addEventListener('touchstart',ts,{passive:true});
    el.addEventListener('touchend',te,{passive:true});
    return()=>{el.removeEventListener('touchstart',ts);el.removeEventListener('touchend',te);};
  }, [onLeft, onRight]);
  return ref;
};

// ── TIMER BANNER ───────────────────────────────────────────────────────────────
function TimerBanner({ lesson, name, onAttend }) {
  const [now, setNow] = useState(Date.now());
  useEffect(() => { const id = setInterval(()=>setNow(Date.now()), 1000); return()=>clearInterval(id); }, []);
  const start = new Date(`${lesson.date}T${lesson.time}`).getTime();
  const end = start + (lesson.duration||60)*60000;
  const progress = Math.min(1, Math.max(0, (now-start)/(end-start)));
  const remaining = Math.max(0, Math.ceil((end-now)/60000));
  return (
    <div className="timer-banner timer-pulse">
      <div style={{flex:1}}>
        <div style={{fontFamily:'Unbounded,cursive',fontSize:11,fontWeight:900}}>Идёт урок: {name}</div>
        <div style={{fontSize:12,marginTop:4}}>Осталось {remaining} мин</div>
        <div className="timer-bar" style={{marginTop:6}}><div className="timer-fill" style={{width:`${progress*100}%`}}/></div>
      </div>
      <button className="btn btn-sm btn-black" onClick={onAttend}>Завершить</button>
    </div>
  );
}

    const t=new Date(`${l.date}T${l.time}`);
    const diff=(t-now)/60000;
    if(diff>0&&diff<=15) notifs.push({id:'soon_'+l.id,icon:'⏰',text:`Урок через ${Math.ceil(diff)} мин`,sub:l.time});
  });
  // Debtors > 2 lessons worth
  students.filter(s=>!s.archived&&s.balance<-s.rate*2).forEach(s=>{
    notifs.push({id:'debt_'+s.id,icon:'💸',text:`${s.name}: долг ${money(Math.abs(s.balance))}`,sub:'Большая задолженность'});
  });
  // Package ending
  students.filter(s=>!s.archived&&(s.packageLessons||0)===1).forEach(s=>{
    notifs.push({id:'pkg_'+s.id,icon:'📦',text:`${s.name}: абонемент заканчивается`,sub:'Остался 1 урок'});
  });
  // Tomorrow lessons count
  const tmrw=new Date(now);tmrw.setDate(tmrw.getDate()+1);
  const tmrwStr=localDateString(tmrw);
  const tmrwCount=lessons.filter(l=>l.date===tmrwStr&&l.status==='planned').length;
  if(tmrwCount>0) notifs.push({id:'tmrw',icon:'📅',text:`Завтра ${tmrwCount} урок(ов)`,sub:''});
  return notifs;
};

// ── MODALS ─────────────────────────────────────────────────────────────────────
function Modal({ title, onClose, children }) {
  useEffect(() => {
    document.body.style.overflow = 'hidden';
    const fn = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', fn);
    return () => { document.body.style.overflow = ''; window.removeEventListener('keydown', fn); };
  }, []);
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,paddingBottom:12,borderBottom:'var(--border)'}}>
          <div className="modal-title" style={{marginBottom:0,paddingBottom:0,borderBottom:'none'}}>{title}</div>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',padding:4,color:'var(--black)'}}><IcoX size={20}/></button>
        </div>
        {children}
      </div>
    </div>
  );
}

function FormField({ label, children }) {
  return <div style={{marginBottom:14}}><label className="label">{label}</label>{children}</div>;
}

  const [name, setName]   = useState(student?.name || '');

  const [goal, setGoal]   = useState(student?.goal || '');
  const [notes, setNotes] = useState(student?.notes || '');

  const submit = (e) => { e.preventDefault(); if (!name.trim()) return; const lr={}; Object.entries(lessonRates).forEach(([k,v])=>{if(String(v).trim()!=='')lr[k]=Number(v);}); onSave({name,rate:Number(rate),phone,tgId,subjects:subjects.length?subjects:['История'],goal,notes,archived,lessonRates:lr}); };

    <Modal title={student ? 'Редактировать' : 'Новый ученик'} onClose={onClose}>

                />
              </div>
            ))}
          </FormField>
        )}
        <FormField label="Телефон"><input className="input" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="+7 ..."/></FormField>
        <FormField label="Telegram (username или ID)">
          <input className="input" value={tgId} onChange={e=>setTgId(e.target.value)} placeholder="@username или 123456789"/>
        </FormField>
        <FormField label="Цель"><input className="input" value={goal} onChange={e=>setGoal(e.target.value)} placeholder="ЕГЭ история, ОГЭ, школьная программа"/></FormField>
        <FormField label="Заметки"><textarea className="input" value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Слабые темы, родитель, особенности" style={{minHeight:74,resize:'vertical'}}/></FormField>

          <button type="submit" className="btn btn-black btn-full">Сохранить</button>

    </Modal>
  );

function LessonModal({ students, groups, initialDate, initialStudentId, lessonToEdit, onClose, onSave }) {
  const [type, setType]       = useState(lessonToEdit?.type || (initialStudentId ? 'individual' : 'group'));
  const [targetId, setTgt]    = useState(lessonToEdit ? String(lessonToEdit.targetId) : (initialStudentId ? String(initialStudentId) : ''));
  const [subject, setSubject] = useState(lessonToEdit?.subject || 'История');
  const [date, setDate]       = useState(lessonToEdit?.date || initialDate || getTodayDate());
  const [time, setTime]       = useState(lessonToEdit?.time || '15:00');
  const [days, setDays]       = useState([]);
  const [recurring, setRec]   = useState(false);
  const [weeks, setWeeks]     = useState(4);
  const [applySeries, setApplySeries] = useState(false);
  const [topic, setTopic] = useState(lessonToEdit?.topic || '');
  const [homework, setHomework] = useState(lessonToEdit?.homework || '');
  const [lessonNote, setLessonNote] = useState(lessonToEdit?.lessonNote || '');
  const [duration, setDuration] = useState(lessonToEdit?.duration || 60);
  const activeGroups = groups.filter(g => !g.archived || lessonToEdit?.targetId === g.id);
  const activeStudents = students.filter(s => !s.archived || lessonToEdit?.targetId === s.id || initialStudentId === s.id);

  useEffect(() => {
    if (!lessonToEdit && days.length === 0 && date) setDays([new Date(date).getDay()]);
  }, [date]);
  useEffect(() => {
    if (type==='individual' && activeStudents.length && !targetId) setTgt(String(activeStudents[0].id));
    if (type==='group' && activeGroups.length && (!targetId || !activeGroups.find(g=>g.id===Number(targetId)))) setTgt(String(activeGroups[0].id));
  }, [type, groups]);
  useEffect(() => {
    if (lessonToEdit) return;
    if (type === 'group') {
      const g = activeGroups.find(x=>x.id===Number(targetId));
      if (g?.subject) setSubject(g.subject);
    } else {
      const s = activeStudents.find(x=>x.id===Number(targetId));
      if (s?.subjects?.length) setSubject(s.subjects[0]);
    }
  }, [type, targetId]);

  const toggleDay = (d) => {
    if (days.includes(d)) { if (days.length > 1) setDays(days.filter(x=>x!==d)); }
    else setDays([...days, d].sort());
  };

  const submit = (e) => {
    e.preventDefault();
    if (!targetId) return;
    const base = { type, targetId: Number(targetId), subject, time, duration: Number(duration), topic, homework, lessonNote };
    if (lessonToEdit) { onSave([{...base, date}], {applySeries}); return; }
    const arr = [];
    const seriesId = (recurring || days.length > 1) ? Date.now() : null;
    const [y,m,dd] = date.split('-').map(Number);
    const baseDate = new Date(y, m-1, dd);
    days.forEach(di => {
      let iter = new Date(baseDate);
      const curr = iter.getDay();
      iter.setDate(iter.getDate() + (di - curr + 7) % 7);
      const wc = recurring ? weeks : 1;
      for (let i = 0; i < wc; i++) {
        const nd = new Date(iter); nd.setDate(iter.getDate() + i*7);
        arr.push({...base, seriesId, date:`${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,'0')}-${String(nd.getDate()).padStart(2,'0')}`});
      }
    });
    onSave(arr);
  };

  return (
    <Modal title={lessonToEdit ? 'Изменить занятие' : 'Новое занятие'} onClose={onClose}>
      <form onSubmit={submit}>
        <div className="toggle-row" style={{marginBottom:14}}>
          <button type="button" className={`toggle-opt ${type==='group'?'active':''}`} onClick={()=>setType('group')}>Группа</button>
          <button type="button" className={`toggle-opt ${type==='individual'?'active':''}`} onClick={()=>setType('individual')}>Индивидуально</button>
        </div>
        <FormField label={type==='group'?'Группа':'Ученик'}>
          <select className="input" required value={targetId} onChange={e=>setTgt(e.target.value)}>
            {type==='individual'
              ? activeStudents.map(s=><option key={s.id} value={s.id}>{s.name}{s.archived?' (архив)':''}</option>)
              : activeGroups.map(g=><option key={g.id} value={g.id}>{g.name}{g.archived?' (архив)':''}</option>)}
          </select>
        </FormField>
        <FormField label="Предмет">
          <select className="input" required value={subject} onChange={e=>setSubject(e.target.value)}>
            {SUBJECTS.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </FormField>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
          <div><label className="label">{lessonToEdit?'Дата':'Дата начала'}</label><input className="input" type="date" required value={date} onChange={e=>setDate(e.target.value)}/></div>
          <div><label className="label">Время</label><input className="input" type="time" required value={time} onChange={e=>setTime(e.target.value)}/></div>
        </div>
        <FormField label="Длительность">
          <div style={{display:'flex',gap:6}}>
            {[30,45,60,90,120].map(d => (
              <button key={d} type="button"
                onClick={()=>setDuration(d)}
                className={`btn btn-sm ${duration===d ? 'btn-black' : 'btn-white'}`}
                style={{flex:1,padding:'7px 2px',fontSize:10,fontFamily:'Unbounded,cursive',fontWeight:700}}>
                {d<60 ? `${d}м` : d===60 ? '1ч' : d===90 ? '1.5ч' : '2ч'}
              </button>
            ))}
          </div>
        </FormField>
        <FormField label="Тема урока"><input className="input" value={topic} onChange={e=>setTopic(e.target.value)} placeholder="Например: реформы Петра I"/></FormField>
        <FormField label="Домашка"><textarea className="input" value={homework} onChange={e=>setHomework(e.target.value)} placeholder="Что сделать к следующему уроку" style={{minHeight:70,resize:'vertical'}}/></FormField>
        <FormField label="Заметка после урока"><textarea className="input" value={lessonNote} onChange={e=>setLessonNote(e.target.value)} placeholder="Что получилось, что повторить" style={{minHeight:70,resize:'vertical'}}/></FormField>
        {!lessonToEdit && (
          <div style={{background:'#fffde0',border:'2.5px solid #0a0a0a',borderRadius:4,padding:12,marginBottom:14}}>
            <div className="label" style={{marginBottom:8}}>Дни недели</div>
            <div style={{display:'flex',gap:6,justifyContent:'space-between'}}>
              {DAY_INDEXES.map(i => (
                <button key={i} type="button" onClick={()=>toggleDay(i)}
                  style={{
                    width:36,height:36,border:'2.5px solid #0a0a0a',borderRadius:4,cursor:'pointer',
                    fontFamily:'Unbounded,cursive',fontSize:10,fontWeight:700,
                    background: days.includes(i) ? '#0a0a0a' : '#f5f0e8',
                    color: days.includes(i) ? '#FFE500' : '#0a0a0a',
                    boxShadow: days.includes(i) ? 'none' : '2px 2px 0 #0a0a0a',
                  }}>
                  {DAYS_SHORT[i]}
                </button>
              ))}
            </div>
            <div style={{marginTop:10,display:'flex',alignItems:'center',gap:8}}>
              <div className={`check-box ${recurring?'checked':''}`} onClick={()=>setRec(!recurring)} style={{cursor:'pointer'}}>
                {recurring && <IcoCheck size={14}/>}
              </div>
              <span style={{fontSize:11,fontFamily:'Unbounded,cursive',fontWeight:700}}>Повторять еженедельно</span>
            </div>
            {recurring && (
              <div style={{marginTop:8,display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:11}}>на</span>
                <select className="input" value={weeks} onChange={e=>setWeeks(Number(e.target.value))} style={{width:'auto',padding:'6px 8px'}}>
                  {[2,3,4,5,8,12,16].map(w=><option key={w} value={w}>{w} нед.</option>)}
                </select>
                <span style={{fontSize:11}}>вперёд</span>
              </div>
            )}
          </div>
        )}
        {lessonToEdit?.seriesId && (
          <div className={`check-row ${applySeries?'checked':''}`} onClick={()=>setApplySeries(!applySeries)}>
            <span style={{fontWeight:700}}>Применить время/участников ко всей серии</span>
            <div className={`check-box ${applySeries?'checked':''}`}>{applySeries && <IcoCheck size={14}/>}</div>
          </div>
        )}
        <div style={{display:'flex',gap:10,marginTop:8}}>
          <button type="button" className="btn btn-white btn-full" onClick={onClose}>Отмена</button>
          <button type="submit" disabled={!targetId} className="btn btn-black btn-full">
            {lessonToEdit ? 'Сохранить' : 'Создать'}
          </button>
        </div>
      </form>
    </Modal>
  );
}

function AttendanceModal({ lesson, students, groups, onClose, onSave }) {
  const group = lesson.type === 'group' ? groups.find(g=>g.id===lesson.targetId) : null;
  const ls = useMemo(() =>
    lesson.type==='individual'
      ? [students.find(s=>s.id===lesson.targetId)].filter(Boolean)
      : (group?.studentIds.map(id=>students.find(s=>s.id===id)).filter(Boolean)||[]),
    [lesson,students,groups]);

  const [att, setAtt] = useState(() => {
    if (lesson.status==='completed' && lesson.attendance) return lesson.attendance;
    const a={}; ls.forEach(s=>a[s.id]=true); return a;
  });
  const [topic, setTopic] = useState(lesson.topic || '');
  const [homework, setHomework] = useState(lesson.homework || '');
  const [lessonNote, setLessonNote] = useState(lesson.lessonNote || '');

  const submit = (e) => { e.preventDefault(); onSave(lesson.id, att, {topic, homework, lessonNote}); };

  return (
    <Modal title="Посещаемость" onClose={onClose}>
      <div style={{background:'#fffde0',border:'2.5px solid #0a0a0a',borderRadius:4,padding:10,marginBottom:14,fontSize:12}}>
        <strong>{fmtDate(lesson.date)}</strong> в <strong>{lesson.time}</strong>
        <div style={{marginTop:4,color:'#444'}}>Снимите галочку — деньги вернутся на баланс</div>
      </div>
      <form onSubmit={submit}>
        <FormField label="Тема"><input className="input" value={topic} onChange={e=>setTopic(e.target.value)} placeholder="Что проходили"/></FormField>
        <FormField label="Домашка"><textarea className="input" value={homework} onChange={e=>setHomework(e.target.value)} placeholder="Что задать" style={{minHeight:64,resize:'vertical'}}/></FormField>
        <FormField label="Заметка"><textarea className="input" value={lessonNote} onChange={e=>setLessonNote(e.target.value)} placeholder="Что важно помнить" style={{minHeight:64,resize:'vertical'}}/></FormField>
        {ls.map(s => {
          const rate = group?.rateOverrides?.[s.id] ?? s.rate;
          const present = att[s.id] || false;
          return (
            <div key={s.id} className={`check-row ${present?'checked':''}`} onClick={()=>setAtt(p=>({...p,[s.id]:!p[s.id]}))}>
              <div>
                <div style={{fontWeight:700,textDecoration:present?'none':'line-through',color:present?'#0a0a0a':'#aaa'}}>{s.name}</div>
                <div style={{fontSize:11,color:'#666'}}>{rate} ₽</div>
              </div>
              <div className={`check-box ${present?'checked':''}`}>

        </div>

        <button className="btn btn-black btn-full" onClick={()=>onLesson(student.id)}>Урок</button>
        <button className="btn btn-blue btn-full" onClick={()=>onPackage(student)}>Абонемент</button>
        <button className="btn btn-white btn-full" onClick={()=>onMessage(student)}>Сообщение</button>
        {student.tgId && (
          <button className="btn btn-blue btn-full" onClick={()=>{const id=String(student.tgId).trim();window.open(id.startsWith('@')?`https://t.me/${id.slice(1)}`:`https://t.me/${id}`,'_blank');}}>
            <IcoTg size={14}/> Telegram
          </button>
        )}
        <button className="btn btn-white btn-full" onClick={onEdit}>Править</button>
        <button className={`btn btn-full ${student.archived?'btn-green':'btn-white'}`} onClick={()=>onArchive(student.id, !student.archived)}>
          {student.archived ? 'Вернуть' : 'В архив'}
        </button>
        {student.phone && <button className="btn btn-white btn-full" onClick={()=>{ window.location.href = `tel:${phoneClean}`; }}>Позвонить</button>}
      </div>

      <div className="card" style={{padding:12}}>
        <div className="label">Сводка</div>
        <div style={{fontSize:12,lineHeight:1.8}}>
          Ставка: <strong>{money(student.rate)}</strong><br/>
          Предметы: <strong>{(student.subjects || ['История']).join(', ')}</strong><br/>
          Посещаемость: <strong>{completed.length ? Math.round(attended/completed.length*100) : 0}%</strong><br/>
          Уроков: <strong>{ownLessons.length}</strong> · проведено <strong>{completed.length}</strong> · пропусков <strong>{skipped}</strong><br/>
          {student.goal && <>Цель: <strong>{student.goal}</strong><br/></>}
          {student.notes && <>Заметки: {student.notes}</>}
        </div>
      </div>

      {getStudentLastHomework(student.id, lessons, groups) && (
        <div className="card" style={{padding:12}}>
          <div className="label">Последняя домашка</div>
          <div style={{fontSize:12,lineHeight:1.6}}>{getStudentLastHomework(student.id, lessons, groups)}</div>
        </div>
      )}

      <div style={{fontFamily:'Unbounded,cursive',fontSize:11,fontWeight:900,margin:'14px 0 8px'}}>БЛИЖАЙШИЕ УРОКИ</div>

        <div key={l.id} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid #ddd',fontSize:11}}>
          <span>{fmtDate(l.date)} · {l.time} · {l.subject || 'История'}</span>
          <strong>{l.type==='group' ? groups.find(g=>g.id===l.targetId)?.name : 'Индивидуально'}</strong>

function MessageModal({ student, lesson, groups, lessons, templates, onClose, onSaveTemplate }) {
  const allTemplates = [...DEFAULT_TEMPLATES, ...(templates || [])];
  const [selId, setSelId] = useState(allTemplates[0]?.id || '');
  const [editMode, setEditMode] = useState(false); // manage custom templates
  const [customText, setCustomText] = useState('');
  const [editingTpl, setEditingTpl] = useState(null); // {id,name,body} | 'new'
  const [newName, setNewName] = useState('');
  const [newBody, setNewBody] = useState('');
  const [copied, setCopied] = useState(false);

  const targetLesson = lesson || getStudentLessons(student.id, lessons, groups)
    .filter(l=>l.status==='planned')
    .sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time))[0];
  const lastHomework = getStudentLastHomework(student.id, lessons, groups);

  const selectedTpl = allTemplates.find(t=>t.id===selId);
  const generatedText = selectedTpl ? renderTemplate(selectedTpl.body, student, targetLesson, lastHomework) : '';
  const text = customText || generatedText;

  // When template changes, reset custom override
  const pickTemplate = (id) => { setSelId(id); setCustomText(''); setCopied(false); };

  const copy = async () => {
    try { await navigator.clipboard.writeText(text); }
    catch { const a=document.createElement('textarea');a.value=text;document.body.appendChild(a);a.select();document.execCommand('copy');a.remove(); }
    setCopied(true); setTimeout(()=>setCopied(false),2000);
  };

  const openTg = () => {
    if (!student.tgId) return;
    const id = String(student.tgId).trim();
    window.open(id.startsWith('@') ? `https://t.me/${id.slice(1)}` : `https://t.me/${id}`, '_blank');
  };

  if (editMode) {
    const customTemplates = templates || [];
    return (
      <Modal title="Мои шаблоны" onClose={()=>setEditMode(false)}>
        <div style={{fontSize:11,color:'#666',marginBottom:12}}>
          Плейсхолдеры: <code>{'{name}'}</code> <code>{'{lessonDate}'}</code> <code>{'{balance}'}</code> <code>{'{homework}'}</code>
        </div>
        {editingTpl ? (
          <div>
            <FormField label="Название шаблона">
              <input className="input" value={newName} onChange={e=>setNewName(e.target.value)} placeholder="Например: Опоздание"/>
            </FormField>
            <FormField label="Текст">
              <textarea className="input" value={newBody} onChange={e=>setNewBody(e.target.value)} style={{minHeight:100,resize:'vertical'}}
                placeholder="Привет, {name}! ..."/>
            </FormField>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-white btn-full" onClick={()=>{setEditingTpl(null);setNewName('');setNewBody('');}}>Отмена</button>
              <button className="btn btn-black btn-full" onClick={()=>{
                if (!newName.trim() || !newBody.trim()) return;
                if (editingTpl==='new') {
                  onSaveTemplate([...customTemplates,{id:'custom_'+Date.now(),name:newName,body:newBody}]);
                } else {
                  onSaveTemplate(customTemplates.map(t=>t.id===editingTpl.id?{...t,name:newName,body:newBody}:t));
                }
                setEditingTpl(null);setNewName('');setNewBody('');
              }}>Сохранить</button>
            </div>
          </div>
        ) : (
          <>
            <div style={{fontFamily:'Unbounded,cursive',fontSize:10,fontWeight:900,marginBottom:8,color:'#666'}}>ВСТРОЕННЫЕ</div>
            {DEFAULT_TEMPLATES.map(t=>(
              <div key={t.id} style={{padding:'8px 0',borderBottom:'1px solid #ddd',fontSize:11}}>
                <div style={{fontWeight:700,marginBottom:2}}>{t.name}</div>
                <div style={{color:'#666',fontSize:10}}>{t.body}</div>
              </div>
            ))}
            <div style={{fontFamily:'Unbounded,cursive',fontSize:10,fontWeight:900,margin:'14px 0 8px',color:'#666'}}>МОИ ШАБЛОНЫ</div>
            {customTemplates.length===0 && <div style={{fontSize:11,color:'#888',marginBottom:12}}>Нет пользовательских шаблонов</div>}
            {customTemplates.map(t=>(
              <div key={t.id} style={{padding:'8px 0',borderBottom:'1px solid #ddd',display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:11}}>{t.name}</div>
                  <div style={{color:'#666',fontSize:10,marginTop:2}}>{t.body}</div>
                </div>
                <div style={{display:'flex',gap:4,flexShrink:0}}>
                  <button className="btn btn-sm btn-white" style={{padding:'4px 8px'}} onClick={()=>{setEditingTpl(t);setNewName(t.name);setNewBody(t.body);}}>✎</button>
                  <button className="btn btn-sm btn-red" style={{padding:'4px 8px'}} onClick={()=>onSaveTemplate(customTemplates.filter(x=>x.id!==t.id))}>✕</button>
                </div>
              </div>
            ))}
            <div style={{marginTop:12,display:'flex',gap:8}}>
              <button className="btn btn-black btn-full" onClick={()=>{setEditingTpl('new');setNewName('');setNewBody('');}}>+ Новый шаблон</button>
            </div>
          </>
        )}
      </Modal>
    );
  }

  return (
    <Modal title={`Сообщение · ${student.name}`} onClose={onClose}>
      {/* Template picker */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>
        {allTemplates.map(t=>(
          <button key={t.id} className={`btn btn-sm ${selId===t.id?'btn-black':'btn-white'}`}
            style={{padding:'5px 10px',fontSize:9}} onClick={()=>pickTemplate(t.id)}>
            {t.name}
          </button>
        ))}
        <button className="btn btn-sm btn-white" style={{padding:'5px 10px',fontSize:9,marginLeft:'auto'}} onClick={()=>setEditMode(true)}>
          ⚙ Шаблоны
        </button>
      </div>
      {/* Text editor */}
      <FormField label="Текст">
        <textarea className="input" value={customText || generatedText}
          onChange={e=>setCustomText(e.target.value)}
          style={{minHeight:120,resize:'vertical'}}/>
      </FormField>
      {customText && customText !== generatedText && (
        <button style={{background:'none',border:'none',fontSize:10,color:'#666',cursor:'pointer',marginBottom:8,padding:0}}
          onClick={()=>setCustomText('')}>← Вернуть из шаблона</button>
      )}
      <div style={{display:'flex',gap:8,marginTop:4}}>
        <button className={`btn btn-full ${copied?'btn-green':'btn-black'}`} onClick={copy} style={{flex:2}}>
          {copied ? '✓ Скопировано' : 'Скопировать'}
        </button>
        {student.tgId && (
          <button className="btn btn-blue btn-full" onClick={openTg} style={{flex:1,gap:4}}>
            <IcoTg size={14}/> TG
          </button>
        )}
      </div>
    </Modal>
  );
}

// ── SCHEDULE EXPORT MODAL ───────────────────────────────────────────────────────
function ScheduleExportModal({ lessons, onExport, onClose }) {
  const today = getTodayDate();
  const [from, setFrom] = useState(today);
  const [to, setTo] = useState(today);
  const presets = [
    {label:'Эта неделя', fn:()=>{
      const d=new Date(); const dow=d.getDay()||7;
      const mon=new Date(d); mon.setDate(d.getDate()-dow+1);
      const sun=new Date(mon); sun.setDate(mon.getDate()+6);
      setFrom(mon.toISOString().slice(0,10)); setTo(sun.toISOString().slice(0,10));
    }},
    {label:'Этот месяц', fn:()=>{
      const d=new Date();
      setFrom(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`);
      const last=new Date(d.getFullYear(),d.getMonth()+1,0);
      setTo(last.toISOString().slice(0,10));
    }},
    {label:'Прошлый месяц', fn:()=>{
      const d=new Date(); const y=d.getMonth()===0?d.getFullYear()-1:d.getFullYear(); const m=d.getMonth()===0?12:d.getMonth();
      setFrom(`${y}-${String(m).padStart(2,'0')}-01`);
      const last=new Date(y,m,0);
      setTo(last.toISOString().slice(0,10));
    }},
  ];
  const count = lessons.filter(l=>l.date>=from&&l.date<=to).length;
  return (
    <Modal title="Экспорт расписания" onClose={onClose}>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
        {presets.map(p=>(
          <button key={p.label} className="btn btn-sm btn-white" style={{padding:'6px 10px',fontSize:10}} onClick={p.fn}>{p.label}</button>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <FormField label="С"><input className="input" type="date" value={from} onChange={e=>setFrom(e.target.value)}/></FormField>
        <FormField label="По"><input className="input" type="date" value={to} onChange={e=>setTo(e.target.value)}/></FormField>
      </div>
      <div style={{fontSize:11,color:'#666',margin:'8px 0 14px',textAlign:'center'}}>
        {count} занятий в выбранном периоде
      </div>
      <div style={{display:'flex',gap:10}}>
        <button className="btn btn-white btn-full" onClick={onClose}>Отмена</button>
        <button className="btn btn-black btn-full" disabled={!count} onClick={()=>{onExport(from,to);onClose();}}>
          <IcoPrint size={14}/> Печать / PDF
        </button>
      </div>
    </Modal>
  );
}

  { icon:'📱', title:'Telegram-чат одним нажатием', text:'Заполни Telegram ID или @username в профиле ученика — кнопка "Написать" станет синей и откроет чат напрямую без копирования номера.' },

  { icon:'📅', title:'Экспорт расписания', text:'Кнопка PDF в расписании выгружает таблицу за любой период. Удобно сохранить на месяц или отправить родителям.' },
  { icon:'🔍', title:'Фильтр по предметам', text:'В расписании и списке учеников есть фильтр по предмету — удобно когда ведёшь несколько дисциплин.' },
