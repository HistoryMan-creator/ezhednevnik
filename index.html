<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>TutorApp</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Martian+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --black: #0a0a0a;
  --white: #f5f0e8;
  --yellow: #FFE500;
  --red: #FF2D2D;
  --green: #00C853;
  --blue: #0057FF;
  --border: 2.5px solid var(--black);
  --shadow: 4px 4px 0px var(--black);
  --shadow-lg: 6px 6px 0px var(--black);
}
body[data-theme="dark"] {
  --black: #eee6d8;
  --white: #171716;
  --yellow: #ffe66b;
  --red: #ff4b4b;
  --green: #35d071;
  --blue: #4f83ff;
  --border: 2px solid rgba(238,230,216,.78);
  --shadow: 3px 3px 0px rgba(238,230,216,.28);
  --shadow-lg: 4px 4px 0px rgba(238,230,216,.34);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Martian Mono', monospace;
  background: var(--white);
  color: var(--black);
  min-height: 100dvh;
  overscroll-behavior: none;
}
body[data-theme="dark"] {
  background: #0b0b0a;
  color: #eee6d8;
}
h1,h2,h3,.heading { font-family: 'Unbounded', cursive; }

/* NAV BAR */
.navbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; background: var(--black);
  z-index: 100; border-top: var(--border);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 10px 4px 14px;
  color: #888; border: none; background: none; cursor: pointer;
  font-family: 'Martian Mono', monospace; font-size: 9px;
  gap: 4px; transition: color .15s;
  border-right: 1px solid #222;
}
.nav-btn:last-child { border-right: none; }
.nav-btn.active { color: var(--yellow); }
.nav-btn svg { width: 22px; height: 22px; stroke-width: 2px; }
body[data-theme="dark"] .navbar { background: #11110f; border-top-color: rgba(238,230,216,.6); }
body[data-theme="dark"] .nav-btn { color: #7d786f; border-right-color: #27241f; }
body[data-theme="dark"] .nav-btn.active { color: var(--yellow); }

/* MAIN */
.main { padding: 16px 16px 90px; max-width: 480px; margin: 0 auto; }

/* CARDS */
.card {
  background: var(--white);
  border: var(--border);
  box-shadow: var(--shadow);
  border-radius: 4px;
  margin-bottom: 12px;
}
.card-header {
  background: var(--black); color: var(--yellow);
  font-family: 'Unbounded', cursive; font-size: 11px;
  padding: 8px 12px; letter-spacing: .05em; text-transform: uppercase;
}

/* LESSON CARD */
.lesson-card {
  display: flex; align-items: stretch;
  border: var(--border); box-shadow: var(--shadow);
  border-radius: 4px; margin-bottom: 10px;
  background: var(--white); overflow: hidden;
  cursor: pointer; transition: transform .1s, box-shadow .1s;
  active: transform: translate(4px,4px);
}
.lesson-card:active { transform: translate(4px,4px); box-shadow: 0 0 0 var(--black); }
.lesson-time {
  min-width: 62px; display: flex; flex-direction: column; align-items: center;
  justify-content: center; background: var(--black); color: var(--yellow);
  font-family: 'Unbounded', cursive; font-size: 14px; font-weight: 700;
  padding: 12px 8px; line-height: 1.2;
}
.lesson-body { flex: 1; padding: 10px 12px; display: flex; flex-direction: column; gap: 4px; }
.lesson-name { font-family: 'Unbounded', cursive; font-size: 12px; font-weight: 700; line-height: 1.3; }
.lesson-tag {
  display: inline-block; font-size: 9px; font-weight: 700;
  padding: 2px 6px; border: 1.5px solid var(--black);
  border-radius: 2px; text-transform: uppercase; letter-spacing: .05em;
}
.lesson-actions { display: flex; align-items: center; padding: 0 8px; gap: 6px; }

/* BUTTONS */
.btn {
  font-family: 'Unbounded', cursive; font-weight: 700;
  border: var(--border); box-shadow: var(--shadow);
  border-radius: 4px; cursor: pointer; transition: transform .1s, box-shadow .1s;
  font-size: 12px; padding: 10px 16px; background: var(--yellow); color: var(--black);
  display: inline-flex; align-items: center; gap: 6px;
}
.btn:active { transform: translate(4px,4px); box-shadow: 0 0 0; }
.btn-sm { font-size: 10px; padding: 6px 10px; box-shadow: 3px 3px 0 var(--black); }
.btn-sm:active { transform: translate(3px,3px); box-shadow: 0 0 0; }
.btn-red { background: var(--red); color: var(--white); }
.btn-green { background: var(--green); color: var(--black); }
.btn-black { background: var(--black); color: var(--yellow); }
.btn-white { background: var(--white); color: var(--black); }
.btn-blue { background: var(--blue); color: var(--white); }
.btn-full { width: 100%; justify-content: center; }
body[data-theme="dark"] .btn { box-shadow: 3px 3px 0 rgba(238,230,216,.26); }
body[data-theme="dark"] .btn-blue { background:#4f83ff; color:#fff; }
body[data-theme="dark"] .btn-red { background:#ff4b4b; color:#fff; }
body[data-theme="dark"] .btn-green { background:#35d071; color:#071109; }
body[data-theme="dark"] .btn-white { background:#211f1b; color:#eee6d8; }
body[data-theme="dark"] .btn-black { background:#eee6d8; color:#11110f; }

/* FAB */
.fab {
  position: fixed; right: 16px; bottom: 76px;
  width: 56px; height: 56px; border-radius: 4px;
  background: var(--yellow); border: var(--border);
  box-shadow: var(--shadow-lg); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 99; transition: transform .1s, box-shadow .1s;
}
.fab:active { transform: translate(6px,6px); box-shadow: 0 0 0; }
.fab svg { width: 28px; height: 28px; stroke: var(--black); stroke-width: 2.5; }

/* BADGE */
.badge {
  display: inline-flex; align-items: center; justify-content: center;
  font-family: 'Unbounded', cursive; font-size: 9px; font-weight: 900;
  min-width: 20px; height: 20px; padding: 0 5px;
  border: 1.5px solid var(--black); border-radius: 2px;
}
.badge-red { background: var(--red); color: var(--white); }
.badge-green { background: var(--green); color: var(--black); }
.badge-yellow { background: var(--yellow); color: var(--black); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  z-index: 200; display: flex; align-items: flex-end; justify-content: center;
}
.modal {
  background: var(--white); border-top: 3px solid var(--black);
  border-left: var(--border); border-right: var(--border);
  width: 100%; max-width: 480px; border-radius: 4px 4px 0 0;
  max-height: 90dvh; overflow-y: auto; padding: 20px 16px 32px;
}
.modal-title {
  font-family: 'Unbounded', cursive; font-size: 16px; font-weight: 900;
  margin-bottom: 16px; padding-bottom: 12px; border-bottom: var(--border);
}

/* INPUTS */
.input {
  width: 100%; font-family: 'Martian Mono', monospace; font-size: 14px;
  border: var(--border); border-radius: 4px; padding: 10px 12px;
  background: var(--white); color: var(--black); outline: none;
  box-shadow: 3px 3px 0 var(--black);
}
.input:focus { background: #fffde0; }
body[data-theme="dark"] .input:focus { background: #191919; }
body[data-theme="dark"] .label,
body[data-theme="dark"] .stat-label,
body[data-theme="dark"] [style*="color:'#666'"],
body[data-theme="dark"] [style*="color:#666"],
body[data-theme="dark"] [style*="color: '#666'"] {
  color: #9b9488 !important;
}
.label {
  font-family: 'Unbounded', cursive; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .05em;
  display: block; margin-bottom: 6px;
}

/* STAT CARDS */
.stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat-card {
  border: var(--border); box-shadow: var(--shadow); border-radius: 4px;
  padding: 12px; background: var(--white);
}
.stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: .05em; color: #666; margin-bottom: 4px; }
.stat-value { font-family: 'Unbounded', cursive; font-size: 22px; font-weight: 900; line-height: 1; }

/* PAGE TITLE */
.page-title {
  font-family: 'Unbounded', cursive; font-size: 22px; font-weight: 900;
  margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between;
}

/* DAY SELECTOR */
.day-strip { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
.day-strip::-webkit-scrollbar { display: none; }
.day-btn {
  min-width: 52px; flex-shrink: 0; display: flex; flex-direction: column;
  align-items: center; padding: 8px 4px; border: var(--border);
  border-radius: 4px; cursor: pointer; background: var(--white);
  font-family: 'Unbounded', cursive; transition: transform .1s, box-shadow .1s;
  box-shadow: 3px 3px 0 var(--black);
}
.day-btn.active { background: var(--black); color: var(--yellow); }
.day-btn:active { transform: translate(3px,3px); box-shadow: 0 0 0; }
.day-btn-name { font-size: 10px; font-weight: 700; }
.day-btn-date { font-size: 14px; font-weight: 900; }
.day-btn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); margin-top: 3px; }

/* STUDENT LIST ITEM */
.student-item {
  border: var(--border); box-shadow: var(--shadow); border-radius: 4px;
  padding: 12px; margin-bottom: 10px; background: var(--white);
  display: flex; align-items: center; justify-content: space-between;
}

/* TOGGLE */
.toggle-row { display: flex; gap: 0; border: var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 12px; }
.toggle-opt {
  flex: 1; padding: 8px; text-align: center; cursor: pointer;
  font-family: 'Unbounded', cursive; font-size: 10px; font-weight: 700;
  border: none; background: var(--white); border-right: var(--border);
  transition: background .1s;
}
.toggle-opt:last-child { border-right: none; }
.toggle-opt.active { background: var(--black); color: var(--yellow); }

/* CHECKBOX */
.check-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px; border: var(--border); border-radius: 4px;
  margin-bottom: 8px; cursor: pointer; background: var(--white);
  box-shadow: 3px 3px 0 var(--black);
}
.check-row.checked { background: #e8ffe8; }
body[data-theme="dark"] .check-row.checked { background: #102a16; }
.check-box {
  width: 24px; height: 24px; border: var(--border); border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  background: var(--white); flex-shrink: 0;
}
.check-box.checked { background: var(--green); }

.theme-toggle {
  min-width: 42px; height: 36px; padding: 0;
  justify-content: center;
}
body[data-theme="dark"] .card,
body[data-theme="dark"] .lesson-card,
body[data-theme="dark"] .stat-card,
body[data-theme="dark"] .student-item,
body[data-theme="dark"] .modal,
body[data-theme="dark"] .input,
body[data-theme="dark"] .toggle-opt,
body[data-theme="dark"] .check-row,
body[data-theme="dark"] .check-box,
body[data-theme="dark"] .day-btn {
  background: #171716;
  color: #eee6d8;
}
body[data-theme="dark"] .lesson-time,
body[data-theme="dark"] .card-header,
body[data-theme="dark"] .toggle-opt.active,
body[data-theme="dark"] .day-btn.active {
  background: #eee6d8;
  color: #11110f;
}
body[data-theme="dark"] .lesson-tag,
body[data-theme="dark"] .badge {
  border-color: rgba(238,230,216,.82);
}
body[data-theme="dark"] .lesson-card,
body[data-theme="dark"] .card,
body[data-theme="dark"] .stat-card,
body[data-theme="dark"] .student-item {
  box-shadow: 3px 3px 0 rgba(238,230,216,.22);
}
body[data-theme="dark"] .modal {
  background: #161514;
  border-color: rgba(238,230,216,.75);
}
body[data-theme="dark"] .modal-overlay {
  background: rgba(0,0,0,.72);
}
body[data-theme="dark"] .input,
body[data-theme="dark"] .check-box {
  background: #100f0e;
}
body[data-theme="dark"] .toggle-row {
  border-color: rgba(238,230,216,.7);
}
body[data-theme="dark"] .fab {
  border-color: rgba(238,230,216,.85);
}
body[data-theme="dark"] .badge-red {
  background:#ff4b4b;
  color:#140404;
}
body[data-theme="dark"] .badge-green {
  background:#35d071;
  color:#071109;
}
body[data-theme="dark"] .badge-yellow {
  background:#ffe66b;
  color:#15120a;
}

@keyframes spin { to { transform: rotate(360deg); } }
.spin { animation: spin 1s linear infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// ── UTILS ──────────────────────────────────────────────────────────────────────
const localDateString = (d = new Date()) =>
  `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const getTodayDate = () => localDateString();
const todayObj = new Date();
const currentDay = todayObj.getDay() || 7;
const getDayDate = (target) => {
  const d = new Date(todayObj);
  d.setDate(todayObj.getDate() - currentDay + target);
  return localDateString(d);
};
const fmtDate = (str) => {
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
};
const DAYS_SHORT = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
const DAY_INDEXES = [1,2,3,4,5,6,0];
const MONTH_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const SUBJECTS = ['История','Общество','Русский','Математика','Английский','Другое'];
const inferSubject = (text='') => {
  const t = text.toLowerCase();
  if (t.includes('обществ')) return 'Общество';
  if (t.includes('истор')) return 'История';
  if (t.includes('рус')) return 'Русский';
  if (t.includes('мат')) return 'Математика';
  if (t.includes('англ')) return 'Английский';
  return 'История';
};
const subjectColor = (subject) => ({
  'История':'#0057FF',
  'Общество':'#FFE500',
  'Русский':'#FF2D2D',
  'Математика':'#00C853',
  'Английский':'#8A2BE2',
  'Другое':'#777',
}[subject] || '#777');

// ── AUTO-COMPLETE ──────────────────────────────────────────────────────────────
const runAutoCompletion = (cls, cst, cg, ctx) => {
  let updated = false;
  const now = new Date();
  let newL = [...cls], newS = [...cst], newT = [...ctx];
  newL = newL.map(lesson => {
    const end = new Date(`${lesson.date}T${lesson.time}`);
    end.setHours(end.getHours() + 1);
    if (lesson.status === 'planned' && end <= now) {
      updated = true;
      const grp = lesson.type === 'group' ? cg.find(g => g.id === lesson.targetId) : null;
      const lsStudents = lesson.type === 'individual'
        ? [newS.find(s => s.id === lesson.targetId)].filter(Boolean)
        : (grp?.studentIds.map(id => newS.find(s => s.id === id)).filter(Boolean) || []);
      const billableStudents = lsStudents.filter(s => !s.archived);
      const att = {};
      billableStudents.forEach(s => {
        att[s.id] = true;
        const rate = grp?.rateOverrides?.[s.id] ?? s.rate;
        newT.push({ id: Date.now()+Math.random(), studentId: s.id, type:'charge', amount: rate, date: getTodayDate(), comment:`Авто: ${fmtDate(lesson.date)}`, lessonId: lesson.id });
        const i = newS.findIndex(st => st.id === s.id);
        if (i > -1) newS[i] = { ...newS[i], balance: newS[i].balance - rate };
      });
      return { ...lesson, status:'completed', attendance: att };
    }
    return lesson;
  });
  return updated ? { newLessons: newL, newStudents: newS, newTransactions: newT } : null;
};

// ── MOCK DATA ──────────────────────────────────────────────────────────────────
const mockStudents = [
  {id:1,name:'Вика',rate:1300,phone:'+7 900 001',balance:0},{id:2,name:'Алиса',rate:1300,phone:'+7 900 002',balance:0},
  {id:3,name:'Султан',rate:1500,phone:'+7 900 003',balance:0},{id:4,name:'Али',rate:1500,phone:'+7 900 004',balance:0},
  {id:5,name:'Андрей',rate:1100,phone:'+7 900 005',balance:0},{id:6,name:'Илья',rate:1100,phone:'+7 900 006',balance:0},
  {id:7,name:'Кирилл',rate:1500,phone:'+7 900 007',balance:0},{id:8,name:'Ярослав',rate:1500,phone:'+7 900 008',balance:0},
  {id:9,name:'Миша',rate:1500,phone:'+7 900 009',balance:0},{id:10,name:'Полина',rate:1300,phone:'+7 900 010',balance:0},
  {id:11,name:'Яна',rate:1300,phone:'+7 900 011',balance:0},{id:12,name:'Ирина',rate:1100,phone:'+7 900 012',balance:0},
  {id:13,name:'София',rate:1000,phone:'+7 900 013',balance:0},{id:14,name:'Временной',rate:1000,phone:'+7 900 014',balance:0},
  {id:15,name:'Марк',rate:1300,phone:'+7 900 015',balance:0},{id:16,name:'Анатолий',rate:1300,phone:'+7 900 016',balance:0},
];
const mockGroups = [
  {id:1,name:'История 10 (Вика, Алиса)',subject:'История',studentIds:[1,2]},
  {id:2,name:'История 10 (Султан, Али)',subject:'История',studentIds:[3,4]},
  {id:3,name:'Общество 10 (Султан, Андрей, Илья)',subject:'Общество',studentIds:[3,5,6],rateOverrides:{3:1100}},
  {id:4,name:'Общество 11 (Кирилл, Ярослав, Миша)',subject:'Общество',studentIds:[7,8,9]},
  {id:5,name:'Общество 11 (Полина, Яна)',subject:'Общество',studentIds:[10,11]},
  {id:6,name:'История 10 (Андрей, Ирина, Илья)',subject:'История',studentIds:[5,12,6]},
  {id:7,name:'Общество 9 (София, Временной)',subject:'Общество',studentIds:[13,14]},
  {id:8,name:'Общество 10 (Марк, Анатолий, Ирина)',subject:'Общество',studentIds:[15,16,12]},
  {id:9,name:'История (Полина, Ярослав, Кирилл)',subject:'История',studentIds:[10,8,7],rateOverrides:{10:600,8:1300,7:1300}},
];
const mockLessons = [];
let lId = 1;
for (let w = 0; w < 12; w++) {
  const off = w*7;
  [[1+off,4+off],[2+off,5+off],[3+off,6+off]].forEach(([a,b],i) => {
    const configs = [[1,'15:00'],[2,'18:00'],[3,'16:30'],[4,'18:00'],[5,'15:00'],[6,'16:30'],[7,'16:30'],[8,'15:00'],[9,'18:00']];
    [[a,b]].flat().forEach(day => {
      const date = getDayDate(day);
      const isPast = date < getTodayDate();
      configs.slice(i*3, i*3+3).forEach(([tid, time]) => {
        const group = mockGroups.find(g => g.id === tid);
        mockLessons.push({id:lId++,type:'group',targetId:tid,subject:group?.subject || inferSubject(group?.name),date,time,status:isPast?'completed':'planned'});
      });
    });
  });
}

const STORAGE_KEY = 'tutor-app-state-v2';
const STORAGE_VERSION = 3;
const LESSON_STATUS = {
  planned: { label:'План', short:'ПЛАН', color:'#0057FF' },
  completed: { label:'Проведен', short:'✓', color:'#00C853' },
  cancelled_by_student: { label:'Отменил ученик', short:'УЧ', color:'#FF8C00' },
  cancelled_by_tutor: { label:'Отменил репетитор', short:'РЕП', color:'#666' },
  rescheduled: { label:'Перенесен', short:'ПЕР', color:'#8A2BE2' },
  no_show: { label:'Неявка', short:'НЯ', color:'#FF2D2D' },
};
const FINAL_STATUSES = ['completed','cancelled_by_student','cancelled_by_tutor','rescheduled','no_show'];
const isFinalLesson = (lesson) => FINAL_STATUSES.includes(lesson?.status);
const money = (n) => `${Number(n || 0).toLocaleString('ru-RU')} ₽`;
const cloneDemoState = () => ({
  students: mockStudents.map(s => ({...s, subjects:['История','Общество'], archived:false, packageLessons:0, goal:'', notes:''})),
  groups: mockGroups.map(g => ({...g, subject:g.subject || 'История', studentIds:[...g.studentIds], rateOverrides:{...(g.rateOverrides||{})}, archived:false})),
  lessons: mockLessons.map(l => ({...l, subject:l.subject || 'История', topic:'', homework:'', lessonNote:'', packageUse:{}})),
  txs: [],
  settings: { theme:'light' },
});
const loadSavedState = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    const data = parsed.data || {};
    const groups = (data.groups || []).map(g => {
      const inferred = inferSubject(g.name);
      const subject = inferred !== 'История' ? inferred : (g.subject || inferred);
      return {archived:false, subject, rateOverrides:{}, ...g, subject};
    });
    const lessons = (data.lessons || []).map(l => {
      const group = l.type === 'group' ? groups.find(g => g.id === l.targetId) : null;
      const lessonSubject = group?.subject || l.subject || inferSubject(group?.name);
      return {subject:lessonSubject, topic:'', homework:'', lessonNote:'', packageUse:{}, ...l, subject:lessonSubject};
    });
    const students = (data.students || []).map(s => {
      const groupSubjects = groups.filter(g => g.studentIds?.includes(s.id)).map(g => g.subject);
      const storedSubjects = s.subjects || (s.subject ? [s.subject] : []);
      const subjects = [...new Set([...storedSubjects, ...groupSubjects])];
      return {archived:false, packageLessons:0, goal:'', notes:'', ...s, subjects:subjects.length ? subjects : ['История']};
    });
    return {
      students,
      groups,
      lessons,
      txs: data.txs || [],
      settings: {theme:'light', ...(data.settings || {})},
    };
  } catch (e) {
    console.warn('Не удалось загрузить сохранение', e);
    return null;
  }
};
const saveState = (data) => {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({version:STORAGE_VERSION, savedAt:new Date().toISOString(), data}));
};
const txDelta = (tx) => tx.type === 'payment' ? Number(tx.amount || 0) : -Number(tx.amount || 0);
const getLessonSubject = (lesson, groups) => {
  if (lesson.subject) return lesson.subject;
  if (lesson.type === 'group') return groups.find(g => g.id === lesson.targetId)?.subject || 'История';
  return 'История';
};
const getLessonStudents = (lesson, students, groups, opts={}) => {
  const group = lesson.type === 'group' ? groups.find(g => g.id === lesson.targetId) : null;
  const list = lesson.type === 'individual'
    ? [students.find(s => s.id === lesson.targetId)].filter(Boolean)
    : (group?.studentIds.map(id => students.find(s => s.id === id)).filter(Boolean) || []);
  return opts.includeArchived ? list : list.filter(s => !s.archived);
};
const getLessonRate = (lesson, student, groups) => {
  const group = lesson.type === 'group' ? groups.find(g => g.id === lesson.targetId) : null;
  return group?.rateOverrides?.[student.id] ?? student.rate;
};
const getStudentLastHomework = (studentId, lessons, groups) => lessons
  .filter(l => l.homework && (l.type === 'individual'
    ? l.targetId === studentId
    : groups.find(g => g.id === l.targetId)?.studentIds.includes(studentId)))
  .sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time))[0]?.homework || '';
const getStudentLessons = (studentId, lessons, groups) => lessons
  .filter(l => l.type === 'individual'
    ? l.targetId === studentId
    : groups.find(g => g.id === l.targetId)?.studentIds.includes(studentId));

// ── MODALS ─────────────────────────────────────────────────────────────────────
function Modal({ title, onClose, children }) {
  useEffect(() => {
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, []);
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,paddingBottom:12,borderBottom:'2.5px solid #0a0a0a'}}>
          <div className="modal-title" style={{marginBottom:0,paddingBottom:0,borderBottom:'none'}}>{title}</div>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',padding:4}}><IcoX size={20}/></button>
        </div>
        {children}
      </div>
    </div>
  );
}

function FormField({ label, children }) {
  return <div style={{marginBottom:14}}><label className="label">{label}</label>{children}</div>;
}

function StudentModal({ student, onClose, onSave }) {
  const [name, setName]   = useState(student?.name || '');
  const [rate, setRate]   = useState(student?.rate || 1500);
  const [phone, setPhone] = useState(student?.phone || '');
  const [subjects, setSubjects] = useState(student?.subjects || ['История']);
  const [goal, setGoal]   = useState(student?.goal || '');
  const [notes, setNotes] = useState(student?.notes || '');
  const [archived, setArchived] = useState(!!student?.archived);
  const toggleSubject = (subject) => setSubjects(p => p.includes(subject) ? p.filter(x=>x!==subject) : [...p,subject]);
  const submit = (e) => { e.preventDefault(); if (!name.trim()) return; onSave({name,rate:Number(rate),phone,subjects:subjects.length?subjects:['История'],goal,notes,archived}); };
  return (
    <Modal title={student ? 'Редактировать' : 'Новый ученик'} onClose={onClose}>
      <form onSubmit={submit}>
        <FormField label="Имя"><input className="input" required value={name} onChange={e=>setName(e.target.value)} placeholder="ФИО"/></FormField>
        <FormField label="Предметы">
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {SUBJECTS.map(subject => (
              <button key={subject} type="button" className={`btn btn-sm btn-full ${subjects.includes(subject)?'btn-black':'btn-white'}`} onClick={()=>toggleSubject(subject)}>
                {subject}
              </button>
            ))}
          </div>
        </FormField>
        <FormField label="Ставка ₽/урок"><input className="input" type="number" required value={rate} onChange={e=>setRate(e.target.value)}/></FormField>
        <FormField label="Телефон"><input className="input" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="+7 ..."/></FormField>
        <FormField label="Цель"><input className="input" value={goal} onChange={e=>setGoal(e.target.value)} placeholder="ЕГЭ история, ОГЭ, школьная программа"/></FormField>
        <FormField label="Заметки"><textarea className="input" value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Слабые темы, родитель, особенности" style={{minHeight:74,resize:'vertical'}}/></FormField>
        {student && (
          <div className={`check-row ${archived?'checked':''}`} onClick={()=>setArchived(!archived)}>
            <span style={{fontWeight:700}}>Архивный ученик</span>
            <div className={`check-box ${archived?'checked':''}`}>{archived && <IcoCheck size={14}/>}</div>
          </div>
        )}
        <div style={{display:'flex',gap:10,marginTop:8}}>
          <button type="button" className="btn btn-white btn-full" onClick={onClose}>Отмена</button>
          <button type="submit" className="btn btn-black btn-full">Сохранить</button>
        </div>

    </Modal>
  );
}

function GroupModal({ group, students, onClose, onSave }) {

  const [subject, setSubject] = useState(group?.subject || 'История');
  const [sel, setSel]   = useState(group?.studentIds || []);
  const [archived, setArchived] = useState(!!group?.archived);
  const [rateOverrides, setRateOverrides] = useState(group?.rateOverrides || {});
  const availableStudents = students.filter(s => !s.archived || sel.includes(s.id));
  const toggle = (id) => setSel(p => p.includes(id) ? p.filter(x=>x!==id) : [...p,id]);
  const submit = (e) => {
    e.preventDefault();
    if (!name.trim()) return;
    const cleanRates = {};
    Object.entries(rateOverrides).forEach(([id, val]) => {
      if (String(val).trim() !== '') cleanRates[id] = Number(val);
    });
    onSave({name, subject, studentIds: sel, rateOverrides: cleanRates, archived});
  };
  return (
    <Modal title={group ? 'Редактировать группу' : 'Новая группа'} onClose={onClose}>
      <form onSubmit={submit}>
        <FormField label="Название"><input className="input" required value={name} onChange={e=>setName(e.target.value)}/></FormField>
        <FormField label="Предмет">
          <select className="input" value={subject} onChange={e=>setSubject(e.target.value)}>

        <div className="label" style={{marginBottom:8}}>Ученики</div>
        <div style={{maxHeight:240,overflowY:'auto'}}>
          {availableStudents.map(s => (
            <div key={s.id} className={`check-row ${sel.includes(s.id)?'checked':''}`} style={{alignItems:'flex-start',gap:10}}>
              <div onClick={()=>toggle(s.id)} style={{display:'flex',alignItems:'center',gap:10,flex:1,cursor:'pointer'}}>
                <div className={`check-box ${sel.includes(s.id)?'checked':''}`}>
                  {sel.includes(s.id) && <IcoCheck size={14} style={{stroke:'#0a0a0a'}}/>}
                </div>
                <div>
                  <div style={{fontWeight:700}}>{s.name}</div>
                  <div style={{fontSize:10,color:'#666'}}>обычная ставка {money(s.rate)}</div>
                </div>
              </div>
              {sel.includes(s.id) && (
                <input className="input" type="number" placeholder={s.rate} value={rateOverrides[s.id] ?? ''}
                  onChange={e=>setRateOverrides(p=>({...p,[s.id]:e.target.value}))}
                  style={{width:92,padding:'6px 8px',fontSize:11,boxShadow:'2px 2px 0 #0a0a0a'}}/>
              )}
            </div>
          ))}
        </div>
        <div className={`check-row ${archived?'checked':''}`} onClick={()=>setArchived(!archived)} style={{marginTop:10}}>
          <span style={{fontWeight:700}}>Архивировать группу</span>
          <div className={`check-box ${archived?'checked':''}`}>{archived && <IcoCheck size={14}/>}</div>
        </div>
        <div style={{display:'flex',gap:10,marginTop:12}}>
          <button type="button" className="btn btn-white btn-full" onClick={onClose}>Отмена</button>
          <button type="submit" className="btn btn-black btn-full">{group ? 'Сохранить' : 'Создать'}</button>
        </div>
      </form>
    </Modal>
  );

function TransactionModal({ tx, students, onClose, onSave }) {

function LessonModal({ students, groups, initialDate, initialStudentId, lessonToEdit, onClose, onSave }) {
  const [type, setType]       = useState(lessonToEdit?.type || (initialStudentId ? 'individual' : 'group'));
  const [targetId, setTgt]    = useState(lessonToEdit ? String(lessonToEdit.targetId) : (initialStudentId ? String(initialStudentId) : ''));
  const [subject, setSubject] = useState(lessonToEdit?.subject || 'История');
  const [date, setDate]       = useState(lessonToEdit?.date || initialDate || getTodayDate());
  const [time, setTime]       = useState(lessonToEdit?.time || '15:00');
  const [days, setDays]       = useState([]);
  const [recurring, setRec]   = useState(false);
  const [weeks, setWeeks]     = useState(4);
  const [applySeries, setApplySeries] = useState(false);
  const [topic, setTopic] = useState(lessonToEdit?.topic || '');
  const [homework, setHomework] = useState(lessonToEdit?.homework || '');
  const [lessonNote, setLessonNote] = useState(lessonToEdit?.lessonNote || '');
  const activeGroups = groups.filter(g => !g.archived || lessonToEdit?.targetId === g.id);
  const activeStudents = students.filter(s => !s.archived || lessonToEdit?.targetId === s.id || initialStudentId === s.id);

  useEffect(() => {
    if (!lessonToEdit && days.length === 0 && date) setDays([new Date(date).getDay()]);
  }, [date]);
  useEffect(() => {
    if (type==='individual' && activeStudents.length && !targetId) setTgt(String(activeStudents[0].id));
    if (type==='group' && activeGroups.length && (!targetId || !activeGroups.find(g=>g.id===Number(targetId)))) setTgt(String(activeGroups[0].id));
  }, [type, groups]);
  useEffect(() => {
    if (lessonToEdit) return;
    if (type === 'group') {
      const g = activeGroups.find(x=>x.id===Number(targetId));
      if (g?.subject) setSubject(g.subject);
    } else {
      const s = activeStudents.find(x=>x.id===Number(targetId));
      if (s?.subjects?.length) setSubject(s.subjects[0]);
    }
  }, [type, targetId]);

  const toggleDay = (d) => {
    if (days.includes(d)) { if (days.length > 1) setDays(days.filter(x=>x!==d)); }
    else setDays([...days, d].sort());
  };

  const submit = (e) => {
    e.preventDefault();
    if (!targetId) return;
    const base = { type, targetId: Number(targetId), subject, time, topic, homework, lessonNote };
    if (lessonToEdit) { onSave([{...base, date}], {applySeries}); return; }
    const arr = [];
    const seriesId = (recurring || days.length > 1) ? Date.now() : null;
    const [y,m,dd] = date.split('-').map(Number);
    const baseDate = new Date(y, m-1, dd);
    days.forEach(di => {
      let iter = new Date(baseDate);
      const curr = iter.getDay();
      iter.setDate(iter.getDate() + (di - curr + 7) % 7);
      const wc = recurring ? weeks : 1;
      for (let i = 0; i < wc; i++) {
        const nd = new Date(iter); nd.setDate(iter.getDate() + i*7);
        arr.push({...base, seriesId, date:`${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,'0')}-${String(nd.getDate()).padStart(2,'0')}`});
      }
    });
    onSave(arr);
  };

  return (
    <Modal title={lessonToEdit ? 'Изменить занятие' : 'Новое занятие'} onClose={onClose}>
      <form onSubmit={submit}>
        <div className="toggle-row" style={{marginBottom:14}}>
          <button type="button" className={`toggle-opt ${type==='group'?'active':''}`} onClick={()=>setType('group')}>Группа</button>
          <button type="button" className={`toggle-opt ${type==='individual'?'active':''}`} onClick={()=>setType('individual')}>Индивидуально</button>
        </div>
        <FormField label={type==='group'?'Группа':'Ученик'}>
          <select className="input" required value={targetId} onChange={e=>setTgt(e.target.value)}>
            {type==='individual'
              ? activeStudents.map(s=><option key={s.id} value={s.id}>{s.name}{s.archived?' (архив)':''}</option>)
              : activeGroups.map(g=><option key={g.id} value={g.id}>{g.name}{g.archived?' (архив)':''}</option>)}
          </select>
        </FormField>
        <FormField label="Предмет">
          <select className="input" required value={subject} onChange={e=>setSubject(e.target.value)}>
            {SUBJECTS.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </FormField>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
          <div><label className="label">{lessonToEdit?'Дата':'Дата начала'}</label><input className="input" type="date" required value={date} onChange={e=>setDate(e.target.value)}/></div>
          <div><label className="label">Время</label><input className="input" type="time" required value={time} onChange={e=>setTime(e.target.value)}/></div>
        </div>
        <FormField label="Тема урока"><input className="input" value={topic} onChange={e=>setTopic(e.target.value)} placeholder="Например: реформы Петра I"/></FormField>
        <FormField label="Домашка"><textarea className="input" value={homework} onChange={e=>setHomework(e.target.value)} placeholder="Что сделать к следующему уроку" style={{minHeight:70,resize:'vertical'}}/></FormField>
        <FormField label="Заметка после урока"><textarea className="input" value={lessonNote} onChange={e=>setLessonNote(e.target.value)} placeholder="Что получилось, что повторить" style={{minHeight:70,resize:'vertical'}}/></FormField>
        {!lessonToEdit && (
          <div style={{background:'#fffde0',border:'2.5px solid #0a0a0a',borderRadius:4,padding:12,marginBottom:14}}>
            <div className="label" style={{marginBottom:8}}>Дни недели</div>
            <div style={{display:'flex',gap:6,justifyContent:'space-between'}}>
              {DAY_INDEXES.map(i => (
                <button key={i} type="button" onClick={()=>toggleDay(i)}
                  style={{
                    width:36,height:36,border:'2.5px solid #0a0a0a',borderRadius:4,cursor:'pointer',
                    fontFamily:'Unbounded,cursive',fontSize:10,fontWeight:700,
                    background: days.includes(i) ? '#0a0a0a' : '#f5f0e8',
                    color: days.includes(i) ? '#FFE500' : '#0a0a0a',
                    boxShadow: days.includes(i) ? 'none' : '2px 2px 0 #0a0a0a',
                  }}>
                  {DAYS_SHORT[i]}
                </button>
              ))}
            </div>
            <div style={{marginTop:10,display:'flex',alignItems:'center',gap:8}}>
              <div className={`check-box ${recurring?'checked':''}`} onClick={()=>setRec(!recurring)} style={{cursor:'pointer'}}>
                {recurring && <IcoCheck size={14}/>}
              </div>
              <span style={{fontSize:11,fontFamily:'Unbounded,cursive',fontWeight:700}}>Повторять еженедельно</span>
            </div>
            {recurring && (
              <div style={{marginTop:8,display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:11}}>на</span>

function MessageModal({ student, lesson, groups, lessons, onClose }) {
  const [kind, setKind] = useState('reminder');
  const [copied, setCopied] = useState(false);
  const targetLesson = lesson || getStudentLessons(student.id, lessons, groups)
    .filter(l=>l.status==='planned')
    .sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time))[0];
  const lastHomework = getStudentLastHomework(student.id, lessons, groups);
  const text = (() => {
    const lessonText = targetLesson ? `${fmtDate(targetLesson.date)} в ${targetLesson.time}` : 'ближайшее занятие';
    if (kind === 'reminder') return `Привет! Напоминаю: занятие ${lessonText}.`;
    if (kind === 'debt') return `Привет! По занятиям сейчас долг ${money(Math.abs(student.balance))}. Когда удобно будет оплатить?`;
    if (kind === 'homework') return `Привет! Домашка к следующему занятию: ${lastHomework || 'пока не записана'}.`;
    if (kind === 'reschedule') return `Привет! Нужно перенести занятие ${lessonText}. Напиши, пожалуйста, когда удобно.`;
    return '';
  })();
  const copy = async () => {
    try {
      await navigator.clipboard.writeText(text);
      setCopied(true);
    } catch (e) {
      const area = document.createElement('textarea');
      area.value = text;
      document.body.appendChild(area);
      area.select();
      document.execCommand('copy');
      area.remove();
      setCopied(true);
    }
  };
  return (
    <Modal title="Сообщение" onClose={onClose}>
      <div className="toggle-row">
        <button className={`toggle-opt ${kind==='reminder'?'active':''}`} onClick={()=>setKind('reminder')}>Напомнить</button>
        <button className={`toggle-opt ${kind==='debt'?'active':''}`} onClick={()=>setKind('debt')}>Долг</button>
      </div>
      <div className="toggle-row">
        <button className={`toggle-opt ${kind==='homework'?'active':''}`} onClick={()=>setKind('homework')}>Домашка</button>
        <button className={`toggle-opt ${kind==='reschedule'?'active':''}`} onClick={()=>setKind('reschedule')}>Перенос</button>
      </div>
      <FormField label="Текст"><textarea className="input" readOnly value={text} style={{minHeight:120,resize:'vertical'}}/></FormField>
      <button className={`btn btn-full ${copied?'btn-green':'btn-black'}`} onClick={copy}>{copied ? 'Скопировано' : 'Скопировать'}</button>
    </Modal>
  );
}

// ── MAIN APP ───────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab]           = useState('today');
  const [students, setStudents] = useState([]);
  const [groups, setGroups]     = useState([]);
  const [lessons, setLessons]   = useState([]);
  const [txs, setTxs]           = useState([]);
  const [settings, setSettings] = useState({theme:'light'});
  const [loaded, setLoaded]     = useState(false);

  // selected date for schedule tab
  const [selDate, setSelDate]   = useState(getTodayDate());

  // modals
  const [modal, setModal]       = useState(null); // { type, payload }

  useEffect(() => {
    const saved = loadSavedState();
    const initial = saved || cloneDemoState();
    const r = runAutoCompletion(initial.lessons, initial.students, initial.groups, initial.txs || []);
    setLessons(r?.newLessons || initial.lessons);
    setStudents(r?.newStudents || initial.students);
    setGroups(initial.groups || []);
    setTxs(r?.newTransactions || initial.txs || []);
    setSettings(initial.settings || {theme:'light'});
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    saveState({students, groups, lessons, txs, settings});
  }, [loaded, students, groups, lessons, txs, settings]);

  useEffect(() => {
    document.body.dataset.theme = settings.theme || 'light';
  }, [settings.theme]);

  // ── handlers ──
  const applyBalanceDelta = (studentId, delta) => {
    setStudents(p => p.map(s => s.id === studentId ? {...s, balance:s.balance + delta} : s));
  };

  const saveStudent = (data) => {
    const edit = modal?.payload;
    if (edit) setStudents(p => p.map(s => s.id===edit.id ? {...s,...data} : s));
    else setStudents(p => [...p, {...data, id: Date.now(), balance:0}]);
    setModal(null);
  };
  const archiveStudent = (id, archived=true) => {
    setStudents(p => p.map(s=>s.id===id?{...s,archived}:s));
    if (archived) setGroups(p => p.map(g=>({...g,studentIds:g.studentIds.filter(x=>x!==id)})));
  };
  const delStudent = (id) => {
    if (!confirm('Удалить ученика? Лучше использовать архив, чтобы сохранить историю.')) return;
    setStudents(p => p.filter(s=>s.id!==id));
    setGroups(p => p.map(g=>({...g,studentIds:g.studentIds.filter(x=>x!==id)})));
  };
  const saveGroup = (data) => {
    const edit = modal?.payload;
    if (edit) setGroups(p=>p.map(g=>g.id===edit.id?{...g,...data}:g));
    else setGroups(p=>[...p,{...data,id:Date.now()}]);
    setModal(null);
  };
  const delGroup  = (id) => {
    if(confirm('Удалить группу? Будущие уроки этой группы останутся в расписании.')) {
      setGroups(p=>p.filter(g=>g.id!==id));
    }
  };

  const saveTx = (data) => {
    const edit = modal?.type === 'transaction' ? modal?.payload : null;
    if (edit) {
      const nextTx = {...edit, ...data};
      setTxs(p=>p.map(tx=>tx.id===edit.id?nextTx:tx));
      applyBalanceDelta(edit.studentId, -txDelta(edit));
      applyBalanceDelta(nextTx.studentId, txDelta(nextTx));
    } else {
      const tx = {...data, id:Date.now()};
      setTxs(p=>[tx,...p]);
      applyBalanceDelta(data.studentId, txDelta(tx));
    }
    setModal(null);
  };

  const delTx = (tx) => {
    if (!confirm('Удалить операцию и пересчитать баланс?')) return;
    setTxs(p=>p.filter(t=>t.id!==tx.id));
    applyBalanceDelta(tx.studentId, -txDelta(tx));
  };

  const saveLesson = (data, editId=null, options={}) => {
    if (editId) {
      const editLesson = lessons.find(l=>l.id===editId);
      const patch = data[0];
      setLessons(p=>p.map(l=>{
        if (l.id === editId) return {...l,...patch};
        if (options.applySeries && editLesson?.seriesId && l.seriesId === editLesson.seriesId && l.status === 'planned') {
          return {...l, type:patch.type, targetId:patch.targetId, subject:patch.subject, time:patch.time};
        }
        return l;
      }));
    }
    else {
      const arr = Array.isArray(data)?data:[data];
      setLessons(p=>[...p,...arr.map((l,i)=>({...l,id:Date.now()+i,status:'planned'}))]);
    }
    setModal(null);
  };

  const rescheduleLesson = (lessonId, date, time) => {
    const lesson = lessons.find(l=>l.id===lessonId);
    if (!lesson) return;
    const newLesson = {
      ...lesson,
      id: Date.now(),
      date,
      time,
      status:'planned',
      attendance: undefined,
      rescheduledFrom: lesson.id,
      packageUse:{},
    };
    setLessons(p=>p.map(l=>l.id===lessonId?{...l,status:'rescheduled',rescheduledTo:newLesson.id}:l).concat(newLesson));
    setModal(null);
  };

  const savePackage = (studentId, lessonsCount, amount) => {
    setStudents(p=>p.map(s=>s.id===studentId?{...s,packageLessons:(s.packageLessons||0)+lessonsCount}:s));
    if (amount > 0) {
      const tx = {id:Date.now(),studentId,type:'payment',amount,date:getTodayDate(),comment:`Абонемент: ${lessonsCount} зан.`};
      setTxs(p=>[tx,...p]);
      applyBalanceDelta(studentId, amount);
    }
    setModal(null);
  };

  const delLesson = (id, e) => {
    if(e) e.stopPropagation();
    if(!confirm('Удалить занятие?')) return;
    const lesson = lessons.find(l=>l.id===id);
    if (lesson?.status==='no_show') {
      removeNoShowCharges(id);
    } else if (lesson?.status==='completed') {
      const grp = lesson.type==='group' ? groups.find(g=>g.id===lesson.targetId) : null;
      const refunds=[]; const upd={};
      const pkgRefunds = {};
      Object.entries(lesson.attendance||{}).forEach(([sid,pres])=>{
        if(!pres) return;
        const s = students.find(st=>st.id===Number(sid));
        if(!s) return;
        if (lesson.packageUse?.[s.id]) {
          pkgRefunds[s.id] = (pkgRefunds[s.id]||0) + 1;
          return;
        }
        const rate = grp?.rateOverrides?.[s.id] ?? s.rate;
        refunds.push({id:Date.now()+Math.random(),studentId:s.id,type:'payment',amount:rate,date:getTodayDate(),comment:`Отмена: ${fmtDate(lesson.date)}`});
        upd[s.id] = (upd[s.id]||0) + rate;
      });
      if (refunds.length) {
        setTxs(p=>[...refunds,...p]);
      }
      setStudents(p=>p.map(s=>upd[s.id]!==undefined || pkgRefunds[s.id]
        ? {...s,balance:s.balance+(upd[s.id]||0),packageLessons:(s.packageLessons||0)+(pkgRefunds[s.id]||0)}
        : s));
    }
    setLessons(p=>p.filter(l=>l.id!==id));
    setModal(null);
  };

  const chargeNoShow = (lesson) => {
    const already = txs.some(tx => tx.lessonId === lesson.id && tx.kind === 'no_show');
    if (already) return;
    const ls = getLessonStudents(lesson, students, groups);
    const charges = ls.map((s,i) => ({
      id: Date.now()+i+Math.random(),
      studentId:s.id,
      type:'charge',
      amount:getLessonRate(lesson, s, groups),
      date:getTodayDate(),
      comment:`Неявка: ${fmtDate(lesson.date)}`,
      lessonId:lesson.id,
      kind:'no_show',
    }));
    if (!charges.length) return;
    setTxs(p=>[...charges,...p]);
    setStudents(p=>p.map(s=>{
      const charge = charges.find(tx=>tx.studentId===s.id);
      return charge ? {...s,balance:s.balance-charge.amount} : s;
    }));
  };

  const removeNoShowCharges = (lessonId) => {
    const own = txs.filter(tx => tx.lessonId === lessonId && tx.kind === 'no_show');
    if (!own.length) return;
    setTxs(p=>p.filter(tx => !(tx.lessonId === lessonId && tx.kind === 'no_show')));
    setStudents(p=>p.map(s=>{
      const refund = own.filter(tx=>tx.studentId===s.id).reduce((sum,tx)=>sum+tx.amount,0);
      return refund ? {...s,balance:s.balance+refund} : s;
    }));
  };

  const removeLessonAttendanceTxs = (lessonId) => {
    const own = txs.filter(tx => tx.lessonId === lessonId && tx.kind === 'attendance');
    if (!own.length) return;
    setTxs(p=>p.filter(tx => !(tx.lessonId === lessonId && tx.kind === 'attendance')));
    setStudents(p=>p.map(s=>{
      const delta = own.filter(tx=>tx.studentId===s.id).reduce((sum,tx)=>sum - txDelta(tx),0);
      return delta ? {...s,balance:s.balance+delta} : s;
    }));
  };

  const setLessonStatus = (lessonId, status) => {
    const lesson = lessons.find(l=>l.id===lessonId);
    if (!lesson) return;
    if (lesson.status === 'no_show' && status !== 'no_show') removeNoShowCharges(lessonId);
    if (lesson.status === 'completed' && status !== 'completed') {
      removeLessonAttendanceTxs(lessonId);
      const pkgRefunds = Object.entries(lesson.packageUse || {}).filter(([,used])=>used).map(([sid])=>Number(sid));
      if (pkgRefunds.length) {
        setStudents(p=>p.map(s=>pkgRefunds.includes(s.id)?{...s,packageLessons:(s.packageLessons||0)+1}:s));
      }
    }
    if (status === 'no_show') chargeNoShow(lesson);
    const attendance = status === 'no_show'
      ? Object.fromEntries(getLessonStudents(lesson, students, groups).map(s=>[s.id,false]))
      : lesson.attendance;
    setLessons(p=>p.map(l=>l.id===lessonId?{...l,status,attendance,packageUse:status==='planned'?{}:(l.packageUse||{})}:l));
    setModal(null);
  };

  const saveAttendance = (lessonId, newAtt, meta={}) => {
    const lesson = lessons.find(l => l.id === lessonId);
    if (!lesson) return;
    if (lesson.status === 'no_show') removeNoShowCharges(lessonId);
    const ls = getLessonStudents(lesson, students, groups);

    // KEY: always compute diff from the OLD attendance state
    // For planned → completed: charge everyone who IS present now
    // For completed → edited: only charge/refund the DELTA (who changed status)
    const oldAtt = (lesson.status === 'completed' && lesson.attendance) ? lesson.attendance : {};
    const newTxs = [];
    const upd = {};
    const updPkg = {};
    const oldPackageUse = lesson.packageUse || {};
    const nextPackageUse = {...oldPackageUse};

    ls.forEach(s => {
      const was = !!oldAtt[s.id];
      const is  = !!newAtt[s.id];
      const packageAvailable = (s.packageLessons || 0) + (updPkg[s.id] || 0);
      if (lesson.status === 'planned') {
        // First time completing: charge only present students
        if (is) {
          if (packageAvailable > 0) {
            updPkg[s.id] = (updPkg[s.id] || 0) - 1;
            nextPackageUse[s.id] = true;
          } else {
            const rate = getLessonRate(lesson, s, groups);
            newTxs.push({id: Date.now()+Math.random(), studentId: s.id, type:'charge', amount: rate,
              date: getTodayDate(), comment: `Урок: ${fmtDate(lesson.date)}`, lessonId, kind:'attendance'});
            upd[s.id] = (upd[s.id] || 0) - rate;
            delete nextPackageUse[s.id];
          }
        }
      } else {
        // Already completed: only apply CHANGES
        if (was === is) return; // no change — skip entirely (prevents double-counting)
        const rate = getLessonRate(lesson, s, groups);
        if (was && !is) {
          if (oldPackageUse[s.id]) {
            updPkg[s.id] = (updPkg[s.id] || 0) + 1;
            delete nextPackageUse[s.id];
          } else {
            // Was present, now absent → refund
            newTxs.push({id: Date.now()+Math.random(), studentId: s.id, type:'payment', amount: rate,
              date: getTodayDate(), comment: `Возврат (отсутствовал): ${fmtDate(lesson.date)}`, lessonId, kind:'attendance'});
            upd[s.id] = (upd[s.id] || 0) + rate;
          }
        } else {
          if (packageAvailable > 0) {
            updPkg[s.id] = (updPkg[s.id] || 0) - 1;
            nextPackageUse[s.id] = true;
          } else {
            // Was absent, now present → charge
            newTxs.push({id: Date.now()+Math.random(), studentId: s.id, type:'charge', amount: rate,
              date: getTodayDate(), comment: `Доп. списание (пришёл): ${fmtDate(lesson.date)}`, lessonId, kind:'attendance'});
            upd[s.id] = (upd[s.id] || 0) - rate;
            delete nextPackageUse[s.id];
          }
        }
      }
    });

    if (newTxs.length) {
      setTxs(p => [...newTxs, ...p]);
    }
    setStudents(p => p.map(s => upd[s.id] !== undefined || updPkg[s.id] !== undefined
      ? {...s, balance: s.balance + (upd[s.id] || 0), packageLessons: Math.max(0, (s.packageLessons || 0) + (updPkg[s.id] || 0))}
      : s));
    setLessons(p => p.map(l => l.id === lessonId ? {...l, ...meta, status:'completed', attendance: newAtt, packageUse: nextPackageUse} : l));
    setModal(null);
  };

  // FINANCE PAGE (with full analytics, deduplication-safe)
  const PageFinance = () => {
    const [finTab, setFinTab] = useState('control'); // 'control' | 'analytics'
    const [analyticsPeriod, setAnalyticsPeriod] = useState('current_month');
    const [txStudentFilter, setTxStudentFilter] = useState('all');
    const [txTypeFilter, setTxTypeFilter] = useState('all');

    const activeStudents = students.filter(s => !s.archived);
    const debt    = activeStudents.filter(s => s.balance < 0).reduce((s, st) => s + Math.abs(st.balance), 0);
    const prepaid = activeStudents.filter(s => s.balance > 0).reduce((s, st) => s + st.balance, 0);
    const debtors = activeStudents.filter(s => s.balance < 0).sort((a, b) => a.balance - b.balance);
    const lowPackages = students.filter(s => !s.archived && (s.packageLessons || 0) > 0 && (s.packageLessons || 0) <= 1);
    const historyTxs = txs.filter(tx => {
      if (txStudentFilter !== 'all' && tx.studentId !== Number(txStudentFilter)) return false;
      if (txTypeFilter !== 'all' && tx.type !== txTypeFilter) return false;
      return true;
    });

    // Safe quick-pay: only pays the exact outstanding debt (not arbitrary amount)
    const quickPay = (studentId) => {
      const s = students.find(st => st.id === studentId);
      if (!s || s.balance >= 0) return;
      saveTx({studentId, type:'payment', amount: Math.abs(s.balance), date: getTodayDate(), comment:'Быстрая оплата долга'});
    };

    // ── ANALYTICS ───────────────────────────────────────────────────────────
    const getPeriodBounds = (p) => {
      const now = new Date(); const y = now.getFullYear(), m = now.getMonth();
      if (p === 'current_month') return { start: new Date(y,m,1), end: new Date(y,m+1,0,23,59,59) };
      if (p === 'last_month')    return { start: new Date(y,m-1,1), end: new Date(y,m,0,23,59,59) };
      if (p === 'next_month')    return { start: new Date(y,m+1,1), end: new Date(y,m+2,0,23,59,59) };
      return { start: new Date(2000,0,1), end: new Date(2100,0,1) };
    };
    const bounds = getPeriodBounds(analyticsPeriod);
    const inBounds = (ds) => { const d = new Date(ds+'T00:00:00'); return d >= bounds.start && d <= bounds.end; };

    // All completed lessons
    const completedLessons = lessons.filter(l => l.status === 'completed' || l.status === 'no_show');
    const periodLessons    = lessons.filter(l => inBounds(l.date));
    const periodCompleted  = periodLessons.filter(l => l.status === 'completed' || l.status === 'no_show');
    const periodPlanned    = periodLessons.filter(l => l.status === 'planned');

    // Compute per-student stats across ALL time (for skip rate)
    const studentStats = useMemo(() => {
      const stats = {};
      students.forEach(s => { stats[s.id] = { scheduled: 0, attended: 0, skipped: 0, earned: 0, lost: 0 }; });
      completedLessons.forEach(lesson => {
        const grp = lesson.type === 'group' ? groups.find(g => g.id === lesson.targetId) : null;
        const ls = lesson.type === 'individual'
          ? [students.find(s => s.id === lesson.targetId)].filter(Boolean)
          : (grp?.studentIds.map(id => students.find(s => s.id === id)).filter(Boolean) || []);
        ls.forEach(s => {
          if (!stats[s.id]) return;
          const rate = grp?.rateOverrides?.[s.id] ?? s.rate;
          const present = lesson.status !== 'no_show' && lesson.attendance?.[s.id] !== false;
          stats[s.id].scheduled++;
          if (present) { stats[s.id].attended++; stats[s.id].earned += rate; }
          else          { stats[s.id].skipped++;  stats[s.id].lost   += rate; }
        });
      });
      return stats;
    }, [completedLessons, students, groups]);

    // Average skip rate across all students (weighted by scheduled lessons)
    const totalScheduled = Object.values(studentStats).reduce((s, v) => s + v.scheduled, 0);
    const totalSkipped   = Object.values(studentStats).reduce((s, v) => s + v.skipped, 0);
    const avgSkipRate    = totalScheduled > 0 ? totalSkipped / totalScheduled : 0;

    // Period income (actual from txs)
    const periodTxs        = txs.filter(tx => inBounds(tx.date));
    const actualPayments   = periodTxs.filter(tx => tx.type === 'payment').reduce((s, t) => s + t.amount, 0);
    const actualCharges    = periodTxs.filter(tx => tx.type === 'charge').reduce((s, t) => s + t.amount, 0);

    // Period earned from completed lessons (gross)
    let periodEarned = 0, periodLost = 0;
    periodCompleted.forEach(lesson => {
      const grp = lesson.type === 'group' ? groups.find(g => g.id === lesson.targetId) : null;
      const ls = lesson.type === 'individual'
        ? [students.find(s => s.id === lesson.targetId)].filter(Boolean)
        : (grp?.studentIds.map(id => students.find(s => s.id === id)).filter(Boolean) || []);
      ls.forEach(s => {
        const rate = grp?.rateOverrides?.[s.id] ?? s.rate;
        const present = lesson.status !== 'no_show' && lesson.attendance?.[s.id] !== false;
        if (present) periodEarned += rate;
        else         periodLost   += rate;
      });
    });

    // Projected income for planned lessons in period
    let projIdeal = 0, projRealistic = 0;
    periodPlanned.forEach(lesson => {
      const grp = lesson.type === 'group' ? groups.find(g => g.id === lesson.targetId) : null;
      const ls = lesson.type === 'individual'
        ? [students.find(s => s.id === lesson.targetId)].filter(Boolean)
        : (grp?.studentIds.map(id => students.find(s => s.id === id)).filter(Boolean) || []);
      ls.forEach(s => {
        const rate = grp?.rateOverrides?.[s.id] ?? s.rate;
        projIdeal     += rate;
        projRealistic += rate * (1 - avgSkipRate);
      });
    });

    const totalIdeal     = periodEarned + projIdeal;
    const totalRealistic = periodEarned + projRealistic;

    // Per-student table for period
    const studentPeriodStats = useMemo(() => {
      const st = {};
      students.forEach(s => { st[s.id] = { earned:0, lost:0, scheduled:0, attended:0 }; });
      periodCompleted.forEach(lesson => {
        const grp = lesson.type === 'group' ? groups.find(g => g.id === lesson.targetId) : null;
        const ls = lesson.type === 'individual'
          ? [students.find(s => s.id === lesson.targetId)].filter(Boolean)
          : (grp?.studentIds.map(id => students.find(s => s.id === id)).filter(Boolean) || []);
        ls.forEach(s => {
          if (!st[s.id]) return;
          const rate = grp?.rateOverrides?.[s.id] ?? s.rate;
          const present = lesson.status !== 'no_show' && lesson.attendance?.[s.id] !== false;
          st[s.id].scheduled++;
          if (present) { st[s.id].attended++; st[s.id].earned += rate; }
          else         { st[s.id].lost += rate; }
        });
      });
      return st;
    }, [periodCompleted, students, groups]);

    const studentRows = students
      .map(s => ({ ...s, ...studentPeriodStats[s.id] }))
      .filter(s => s.scheduled > 0)
      .sort((a, b) => b.earned - a.earned);

    const Stat = ({label, value, color, sub}) => (
      <div style={{border:'2.5px solid #0a0a0a',borderRadius:4,padding:'10px 12px',boxShadow:'3px 3px 0 #0a0a0a',background:color||'#f5f0e8'}}>
        <div style={{fontFamily:'Unbounded,cursive',fontSize:9,textTransform:'uppercase',letterSpacing:'.05em',color:color?'rgba(255,255,255,.7)':'#666',marginBottom:4}}>{label}</div>
        <div style={{fontFamily:'Unbounded,cursive',fontSize:18,fontWeight:900,color:color?'#fff':'#0a0a0a',lineHeight:1}}>{value}</div>
        {sub && <div style={{fontSize:10,color:color?'rgba(255,255,255,.7)':'#666',marginTop:3}}>{sub}</div>}
      </div>
    );

    const ControlTab = () => (
      <div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
          <Stat label="Долги" value={`${debt.toLocaleString()} ₽`} color="#FF2D2D" sub={`${debtors.length} чел.`}/>
          <Stat label="Предоплаты" value={`${prepaid.toLocaleString()} ₽`} color="#00C853"/>
        </div>

        {debtors.length > 0 && (
          <>
            <div style={{fontFamily:'Unbounded,cursive',fontSize:12,fontWeight:900,marginBottom:10}}>ДОЛЖНИКИ</div>
            {debtors.map(s => (
              <div key={s.id} style={{display:'flex',alignItems:'center',gap:10,padding:'12px',marginBottom:8,border:'2.5px solid #FF2D2D',borderRadius:4,background:'#fff5f5',boxShadow:'3px 3px 0 #FF2D2D'}}>
                <div style={{flex:1}}>
                  <div style={{fontFamily:'Unbounded,cursive',fontWeight:900,fontSize:12}}>{s.name}</div>
                  <div style={{fontFamily:'Unbounded,cursive',fontSize:16,fontWeight:900,color:'#FF2D2D'}}>{s.balance} ₽</div>
                </div>
                <button className="btn btn-sm btn-green" onClick={() => quickPay(s.id)}>Оплатил</button>
              </div>
            ))}
          </>
        )}

        {lowPackages.length > 0 && (
          <>
            <div style={{fontFamily:'Unbounded,cursive',fontSize:12,fontWeight:900,marginBottom:10}}>АБОНЕМЕНТЫ НА ИСХОДЕ</div>
            {lowPackages.map(s => (
              <div key={s.id} style={{display:'flex',alignItems:'center',gap:10,padding:'12px',marginBottom:8,border:'2.5px solid #FFE500',borderRadius:4,background:'#fffde0',boxShadow:'3px 3px 0 #FFE500'}}>
                <div style={{flex:1}}>
                  <div style={{fontFamily:'Unbounded,cursive',fontWeight:900,fontSize:12}}>{s.name}</div>
                  <div style={{fontSize:11,color:'#666'}}>осталось {s.packageLessons} занятие</div>
                </div>
                <button className="btn btn-sm btn-blue" onClick={() => setModal({type:'package',payload:{student:s}})}>Пополнить</button>
              </div>
            ))}
          </>
        )}

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',margin:'16px 0 10px'}}>
          <div style={{fontFamily:'Unbounded,cursive',fontSize:12,fontWeight:900}}>ИСТОРИЯ</div>
          <button className="btn btn-sm btn-black" onClick={() => setModal({type:'transaction',payload:null})}><IcoPlus size={13}/> Операция</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
          <select className="input" value={txStudentFilter} onChange={e=>setTxStudentFilter(e.target.value)} style={{fontSize:11,padding:'8px'}}>
            <option value="all">Все ученики</option>
            {students.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
          <select className="input" value={txTypeFilter} onChange={e=>setTxTypeFilter(e.target.value)} style={{fontSize:11,padding:'8px'}}>
            <option value="all">Все типы</option>
            <option value="payment">Оплаты</option>
            <option value="charge">Списания</option>
          </select>
        </div>
        {historyTxs.slice(0,50).map(tx => {
          const s = students.find(st => st.id === tx.studentId);
          return (
            <div key={tx.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,padding:'10px 0',borderBottom:'1.5px solid #e0e0e0'}}>
              <div>
                <div style={{fontWeight:700,fontSize:12}}>{s?.name || 'Удалён'}</div>
                <div style={{fontSize:10,color:'#888'}}>{fmtDate(tx.date)} · {tx.comment}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <div style={{fontFamily:'Unbounded,cursive',fontWeight:900,fontSize:14,color:tx.type==='payment'?'#00C853':'#FF2D2D',minWidth:72,textAlign:'right'}}>
                  {tx.type==='payment'?'+':'-'}{money(tx.amount)}
                </div>
                {!tx.lessonId && (
                  <>
                    <button style={{background:'none',border:'none',cursor:'pointer',padding:4}} onClick={()=>setModal({type:'transaction',payload:tx})}><IcoEdit size={15}/></button>
                    <button style={{background:'none',border:'none',cursor:'pointer',padding:4,color:'#999'}} onClick={()=>delTx(tx)}><IcoTrash size={15}/></button>
                  </>
                )}
              </div>
            </div>
          );
        })}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:14}}>
          <button className="btn btn-sm btn-white btn-full" onClick={exportCsv}>Экспорт CSV</button>
          <button className="btn btn-sm btn-red btn-full" onClick={resetDemoData}>Сброс демо</button>
        </div>
      </div>
    );

    const AnalyticsTab = () => (
      <div>
        {/* Period selector */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:16}}>
          {[['last_month','Прошлый мес.'],['current_month','Этот месяц'],['next_month','Следующий'],['all_time','Всё время']].map(([v,l]) => (
            <button key={v} onClick={() => setAnalyticsPeriod(v)}
              style={{fontFamily:'Unbounded,cursive',fontSize:9,fontWeight:700,padding:'8px 6px',border:'2.5px solid #0a0a0a',borderRadius:4,cursor:'pointer',
                background: analyticsPeriod===v ? '#0a0a0a' : '#f5f0e8',
                color: analyticsPeriod===v ? '#FFE500' : '#0a0a0a',
                boxShadow: analyticsPeriod===v ? 'none' : '3px 3px 0 #0a0a0a'}}>
              {l}
            </button>
          ))}
        </div>

        {/* Key metrics */}
        <div style={{fontFamily:'Unbounded,cursive',fontSize:11,fontWeight:900,marginBottom:10}}>ИТОГ ПЕРИОДА</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
          <Stat label="Заработано" value={`${periodEarned.toLocaleString()} ₽`} color="#00C853"/>
          <Stat label="Потеряно на пропусках" value={`${periodLost.toLocaleString()} ₽`} color="#FF2D2D"/>
        </div>

        {/* Forecasts */}
        <div style={{fontFamily:'Unbounded,cursive',fontSize:11,fontWeight:900,marginBottom:10,marginTop:16}}>ПРОГНОЗ (оставшиеся {periodPlanned.length} уроков)</div>
        <div style={{marginBottom:8,border:'2.5px solid #0a0a0a',borderRadius:4,overflow:'hidden',boxShadow:'4px 4px 0 #0a0a0a'}}>
          <div style={{background:'#00C853',padding:'10px 14px'}}>
            <div style={{fontFamily:'Unbounded,cursive',fontSize:9,color:'rgba(0,0,0,.6)',textTransform:'uppercase'}}>Идеальный (все приходят)</div>
            <div style={{fontFamily:'Unbounded,cursive',fontSize:22,fontWeight:900}}>{projIdeal.toLocaleString()} ₽</div>
            <div style={{fontSize:10,color:'rgba(0,0,0,.6)'}}>Итого за период: {totalIdeal.toLocaleString()} ₽</div>
          </div>
          <div style={{background:'#FFE500',padding:'10px 14px',borderTop:'2.5px solid #0a0a0a'}}>
            <div style={{fontFamily:'Unbounded,cursive',fontSize:9,color:'rgba(0,0,0,.6)',textTransform:'uppercase'}}>Реалистичный (с учётом пропусков {Math.round(avgSkipRate*100)}%)</div>
            <div style={{fontFamily:'Unbounded,cursive',fontSize:22,fontWeight:900}}>{Math.round(projRealistic).toLocaleString()} ₽</div>
            <div style={{fontSize:10,color:'rgba(0,0,0,.6)'}}>Итого за период: {Math.round(totalRealistic).toLocaleString()} ₽</div>
          </div>
        </div>

        {/* Skip rate info */}
        <div style={{border:'2.5px solid #0a0a0a',borderRadius:4,padding:'10px 14px',marginBottom:16,background:'#f5f0e8',boxShadow:'3px 3px 0 #0a0a0a'}}>
          <div style={{fontFamily:'Unbounded,cursive',fontSize:10,fontWeight:900,marginBottom:6}}>СТАТИСТИКА ПРОПУСКОВ (все время)</div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:11,color:'#666'}}>{totalScheduled} занятий запланировано</div>
              <div style={{fontSize:11,color:'#666'}}>{totalSkipped} пропущено</div>
            </div>
            <div style={{fontFamily:'Unbounded,cursive',fontSize:28,fontWeight:900,color:avgSkipRate>0.2?'#FF2D2D':avgSkipRate>0.1?'#FF8C00':'#00C853'}}>
              {Math.round(avgSkipRate*100)}%
            </div>
          </div>
          {/* Bar */}
          <div style={{marginTop:10,height:10,background:'#e0e0e0',borderRadius:3,border:'1.5px solid #0a0a0a',overflow:'hidden'}}>
            <div style={{height:'100%',width:`${Math.min(avgSkipRate*100,100)}%`,background:avgSkipRate>0.2?'#FF2D2D':avgSkipRate>0.1?'#FF8C00':'#00C853',transition:'width .3s'}}/>
          </div>
        </div>

        {/* Per-student breakdown */}
        <div style={{fontFamily:'Unbounded,cursive',fontSize:11,fontWeight:900,marginBottom:10}}>ПО УЧЕНИКАМ (период)</div>
        {studentRows.length === 0 ? (
          <div style={{textAlign:'center',padding:20,color:'#999',fontFamily:'Unbounded,cursive',fontSize:11}}>Нет данных за период</div>
        ) : studentRows.map(s => {
          const skipRate = s.scheduled > 0 ? s.skipped / s.scheduled : 0;
          const ownSkip  = studentStats[s.id];
          const allTimeSkip = ownSkip.scheduled > 0 ? ownSkip.skipped / ownSkip.scheduled : 0;
          return (
            <div key={s.id} style={{border:'2.5px solid #0a0a0a',borderRadius:4,padding:'10px 12px',marginBottom:8,boxShadow:'3px 3px 0 #0a0a0a',background:'#f5f0e8'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                <div style={{fontFamily:'Unbounded,cursive',fontWeight:900,fontSize:12}}>{s.name}</div>
                <div style={{display:'flex',gap:6}}>
                  <span style={{fontFamily:'Unbounded,cursive',fontSize:11,fontWeight:900,color:'#00C853'}}>{s.earned.toLocaleString()} ₽</span>
                  {s.lost > 0 && <span style={{fontFamily:'Unbounded,cursive',fontSize:11,fontWeight:900,color:'#FF2D2D'}}>-{s.lost.toLocaleString()} ₽</span>}
                </div>
              </div>
              <div style={{display:'flex',gap:6,fontSize:10,color:'#666',marginBottom:6}}>
                <span>{s.attended}/{s.scheduled} уроков</span>
                <span>·</span>
                <span style={{color:allTimeSkip>0.2?'#FF2D2D':allTimeSkip>0.1?'#FF8C00':'#00C853',fontWeight:700}}>
                  пропуск {Math.round(allTimeSkip*100)}% (всё время)
                </span>
              </div>
              {/* Earned bar */}
              <div style={{height:6,background:'#e0e0e0',borderRadius:3,border:'1px solid #ccc',overflow:'hidden'}}>
                <div style={{height:'100%',display:'flex'}}>
                  <div style={{width:`${s.scheduled>0?(s.attended/s.scheduled)*100:0}%`,background:'#00C853',transition:'width .3s'}}/>
                  <div style={{flex:1,background:'#FF2D2D'}}/>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    );

    return (
      <div>
        <div className="page-title">Финансы</div>
        <div className="toggle-row" style={{marginBottom:16}}>
          <button className={`toggle-opt ${finTab==='control'?'active':''}`} onClick={()=>setFinTab('control')}>Контроль</button>
          <button className={`toggle-opt ${finTab==='analytics'?'active':''}`} onClick={()=>setFinTab('analytics')}>Аналитика</button>
        </div>
        {finTab==='control' ? <ControlTab/> : <AnalyticsTab/>}
      </div>
    );
  };

  if (!loaded) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100dvh',fontFamily:'Unbounded,cursive',fontSize:14}}>Загрузка...</div>;

  return (
    <div>
      <div className="main">
        {tab==='today'    && <PageToday/>}
        {tab==='schedule' && <PageSchedule/>}
        {tab==='students' && <PageStudents/>}
        {tab==='finance'  && <PageFinance/>}
      </div>

      {/* FAB — visible on today and schedule pages */}
      {(tab==='today'||tab==='schedule') && (
        <div className="fab" onClick={()=>setModal({type:'lesson',payload:{date:tab==='schedule'?selDate:getTodayDate()}})}>
          <IcoPlus size={28}/>
        </div>
      )}

      {/* BOTTOM NAV */}
      <nav className="navbar">
        {[
          {id:'today',    icon:<IcoHome/>,    label:'Сегодня'},
          {id:'schedule', icon:<IcoCal/>,     label:'Расписание'},
          {id:'students', icon:<IcoUsers/>,   label:'Ученики'},
          {id:'finance',  icon:<IcoWallet/>,  label:'Финансы'},
        ].map(({id,icon,label}) => (
          <button key={id} className={`nav-btn ${tab===id?'active':''}`} onClick={()=>setTab(id)}>
            {icon}<span>{label}</span>
          </button>
        ))}
      </nav>

      {/* MODALS */}
      {modal?.type==='lesson' && (
        <LessonModal
          students={students} groups={groups}
          initialDate={modal.payload?.date || getTodayDate()}
          initialStudentId={modal.payload?.studentId || null}
          lessonToEdit={modal.payload?.lesson || null}
          onClose={()=>setModal(null)}
          onSave={(data, options)=>saveLesson(data, modal.payload?.lesson?.id||null, options)}
        />
      )}
      {modal?.type==='attendance' && (
        <AttendanceModal lesson={modal.payload} students={students} groups={groups}
          onClose={()=>setModal(null)} onSave={saveAttendance}/>
      )}
      {modal?.type==='student' && (
        <StudentModal student={modal.payload} onClose={()=>setModal(null)} onSave={saveStudent}/>
      )}
      {modal?.type==='studentDetail' && (
        <StudentDetailModal student={modal.payload} students={students} lessons={lessons} txs={txs} groups={groups}
          onClose={()=>setModal(null)}
          onEdit={()=>setModal({type:'student',payload:modal.payload})}
          onPay={(studentId)=>{
            const s = students.find(st=>st.id===studentId);
            if (s?.balance < 0) saveTx({studentId,type:'payment',amount:Math.abs(s.balance),date:getTodayDate(),comment:'Оплата долга'});
          }}
          onLesson={(studentId)=>setModal({type:'lesson',payload:{date:getTodayDate(), studentId}})}
          onPackage={(student)=>setModal({type:'package',payload:{student}})}
          onMessage={(student)=>setModal({type:'message',payload:{student}})}
          onArchive={archiveStudent}
        />
      )}
      {modal?.type==='transaction' && (
        <TransactionModal tx={modal.payload} students={students} onClose={()=>setModal(null)} onSave={saveTx}/>
      )}
      {modal?.type==='group' && (
        <GroupModal group={modal.payload} students={students} onClose={()=>setModal(null)} onSave={saveGroup}/>
      )}
      {modal?.type==='lessonStatus' && (
        <LessonStatusModal lesson={modal.payload} onClose={()=>setModal(null)} onStatus={setLessonStatus} onDelete={delLesson}
          onReschedule={(lesson)=>setModal({type:'reschedule',payload:{lesson}})}
          onMessage={(lesson)=>{
            const firstStudent = getLessonStudents(lesson, students, groups)[0];
            setModal({type:'message',payload:{student:firstStudent,lesson}});
          }}
        />
      )}
      {modal?.type==='package' && (
        <PackageModal student={modal.payload.student} onClose={()=>setModal(null)} onSave={savePackage}/>
      )}
      {modal?.type==='reschedule' && (
        <RescheduleModal lesson={modal.payload.lesson} onClose={()=>setModal(null)} onSave={rescheduleLesson}/>
      )}
      {modal?.type==='message' && modal.payload?.student && (
        <MessageModal student={modal.payload.student} lesson={modal.payload.lesson || null} groups={groups} lessons={lessons} onClose={()=>setModal(null)}/>
      )}
    </div>
  );
}

// Shared LessonCard component
function LessonCard({ lesson, name, onEdit, onAttend, onStatus, onDelete, compact=false }) {
  const done = isFinalLesson(lesson);
  const statusInfo = LESSON_STATUS[lesson.status] || LESSON_STATUS.planned;
  return (
    <div className="lesson-card" style={{opacity:done ? .75 : 1}}>
      <div className="lesson-time" style={{background:done?'#333':'#0a0a0a',minWidth:compact?52:62,fontSize:compact?12:14}}>
        <span>{lesson.time}</span>
        {done && <span style={{fontSize:8,color:'#ddd',marginTop:2}}>{statusInfo.short}</span>}
      </div>
      <div className="lesson-body">
        <div className="lesson-name" style={{fontSize:compact?11:12}}>{name}</div>
        <div>
          <span className="lesson-tag" style={{background:lesson.type==='group'?'#0057FF':'#FFE500',color:lesson.type==='group'?'#fff':'#0a0a0a'}}>
            {lesson.type==='group'?'Группа':'Инд.'}
          </span>
          <span className="lesson-tag" style={{marginLeft:5,background:subjectColor(lesson.subject || 'История'),color:(lesson.subject==='Общество'||lesson.subject==='Математика')?'#0a0a0a':'#fff'}}>
            {lesson.subject || 'История'}
          </span>
          {lesson.seriesId && <span className="lesson-tag" style={{marginLeft:5,background:'#fff',color:'#0a0a0a'}}>серия</span>}
          {lesson.homework && <span className="lesson-tag" style={{marginLeft:5,background:'#00C853',color:'#0a0a0a'}}>ДЗ</span>}
          {lesson.status !== 'planned' && (
            <span className="lesson-tag" style={{marginLeft:5,background:statusInfo.color,color:'#fff'}}>{statusInfo.label}</span>
          )}
        </div>
      </div>
      <div className="lesson-actions">
        {lesson.status==='planned' ? (
          <button className="btn btn-sm btn-green" onClick={e=>{e.stopPropagation();onAttend();}}>
            <IcoPlay size={14}/>
          </button>
        ) : lesson.status==='completed' ? (
          <button className="btn btn-sm btn-white" onClick={e=>{e.stopPropagation();onAttend();}}>
            <IcoCheck size={14}/>
          </button>
        ) : (
          <button className="btn btn-sm btn-white" onClick={e=>{e.stopPropagation();onStatus();}}>
            {statusInfo.short}
          </button>
        )}
        <button style={{background:'none',border:'none',cursor:'pointer',padding:6,color:'#555'}} onClick={e=>{e.stopPropagation();onEdit();}}>
          <IcoEdit size={16}/>
        </button>
        <button style={{background:'none',border:'none',cursor:'pointer',padding:6,color:'#555'}} onClick={e=>{e.stopPropagation();onStatus();}}>
          <IcoRepeat size={16}/>
        </button>
        <button style={{background:'none',border:'none',cursor:'pointer',padding:6,color:'#999'}} onClick={onDelete}>
          <IcoTrash size={16}/>
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
