function TipsModal({ onClose }) {
  const [idx, setIdx] = useState(0);
  const tip = TIPS[idx];
  return (
    <Modal title="Советы" onClose={onClose}>
      <div style={{textAlign:'center',padding:'8px 0 20px'}}>
        <div style={{fontSize:52,marginBottom:12}}>{tip.icon}</div>
        <div style={{fontFamily:'Unbounded,cursive',fontWeight:900,fontSize:14,marginBottom:12,lineHeight:1.4}}>{tip.title}</div>
        <div style={{fontSize:12,lineHeight:1.7,color:'var(--black)',opacity:.8}}>{tip.text}</div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
        {TIPS.map((_,i)=>(
          <div key={i} onClick={()=>setIdx(i)} style={{
            flex:1,height:4,borderRadius:2,cursor:'pointer',
            background: i===idx ? 'var(--black)' : '#ddd',
            transition:'background .2s',
          }}/>
        ))}
      </div>
      <div style={{display:'flex',gap:8}}>
        <button className="btn btn-white btn-full" disabled={idx===0} onClick={()=>setIdx(i=>i-1)}>← Назад</button>
        {idx < TIPS.length-1
          ? <button className="btn btn-black btn-full" onClick={()=>setIdx(i=>i+1)}>Вперёд →</button>
          : <button className="btn btn-black btn-full" onClick={onClose}>Готово ✓</button>
        }
      </div>
    </Modal>
  );
}

// ── MAIN APP ───────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab]           = useState('today');
  const [students, setStudents] = useState([]);
  const [groups, setGroups]     = useState([]);
  const [lessons, setLessons]   = useState([]);
  const [txs, setTxs]           = useState([]);
  const [settings, setSettings] = useState({theme:'light'});
  const [loaded, setLoaded]     = useState(false);

  // selected date for schedule tab
  const [selDate, setSelDate]   = useState(getTodayDate());

  // modals
  const [modal, setModal]       = useState(null); // { type, payload }

  // ── Hoisted page state (survives modal open/close) ──
  const [studentsView, setStudentsView] = useState('students');
  const [studentsQ, setStudentsQ] = useState('');
  const [studentsDebtOnly, setStudentsDebtOnly] = useState(false);
  const [studentsShowArchived, setStudentsShowArchived] = useState(false);
  const [studentsSubjectFilter, setStudentsSubjectFilter] = useState('all');
  const [schedView, setSchedView] = useState('week');
  const [weekOffset, setWeekOffset] = useState(0);
  const [calMonth, setCalMonth] = useState(new Date());
  const [schedSubject, setSchedSubject] = useState('all');
  const [customTemplates, setCustomTemplates] = useState([]);
  const [showSearch, setShowSearch] = useState(false);
  const [fabOpen, setFabOpen] = useState(false);
  const [showNotifs, setShowNotifs] = useState(false);
  const notifications = useMemo(() => loaded ? generateNotifications(lessons, students, groups) : [], [loaded, lessons, students, groups]);

  // ── Undo system ──
  const [pendingUndo, setPendingUndo] = useState(null);
  const undoTimerRef = useRef(null);

  const triggerUndo = (label, snapL, snapS, snapT, snapG) => {
    if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
    setPendingUndo({ label, restore: () => {
      setLessons(snapL); setStudents(snapS); setTxs(snapT);
      if (snapG !== undefined) setGroups(snapG);
    }});
    undoTimerRef.current = setTimeout(() => setPendingUndo(null), 4000);
  };
  const handleUndo = () => {
    if (!pendingUndo) return;
    clearTimeout(undoTimerRef.current);
    pendingUndo.restore();
    setPendingUndo(null);
  };

  useEffect(() => {
    const saved = loadSavedState();
    const initial = saved || cloneDemoState();
    const r = runAutoCompletion(initial.lessons, initial.students, initial.groups, initial.txs || []);
    setLessons(r?.newLessons || initial.lessons);
    setStudents(r?.newStudents || initial.students);
    setGroups(initial.groups || []);
    setTxs(r?.newTransactions || initial.txs || []);
    setSettings(initial.settings || {theme:'light'});
    // load custom templates
    try { const t=localStorage.getItem('tutor-templates'); if(t) setCustomTemplates(JSON.parse(t)); } catch{}
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    saveState({students, groups, lessons, txs, settings});
  }, [loaded, students, groups, lessons, txs, settings]);

  // Auto-backup every 5 minutes with rotation (keep last 3)
  useEffect(() => {
    if (!loaded) return;
    const interval = setInterval(() => {
      try {
        const backup = JSON.stringify({v:STORAGE_VERSION, t:new Date().toISOString(), data:{students,groups,lessons,txs,settings}});
        const keys = ['tutor-backup-1','tutor-backup-2','tutor-backup-3'];
        // Rotate: 2→3, 1→2, new→1
        const b2 = localStorage.getItem(keys[1]);
        if (b2) localStorage.setItem(keys[2], b2);
        const b1 = localStorage.getItem(keys[0]);
        if (b1) localStorage.setItem(keys[1], b1);
        localStorage.setItem(keys[0], backup);
      } catch(e) {
        if (e.name === 'QuotaExceededError') {
          console.warn('localStorage full — скачайте бэкап!');
        }
      }
    }, 5*60*1000);
    return () => clearInterval(interval);
  }, [loaded, students, groups, lessons, txs, settings]);

  useEffect(() => {
    if (!loaded) return;
    localStorage.setItem('tutor-templates', JSON.stringify(customTemplates));
  }, [loaded, customTemplates]);

  useEffect(() => {
    document.body.dataset.theme = settings.theme || 'light';
  }, [settings.theme]);

  // ── handlers ──
  const applyBalanceDelta = (studentId, delta) => {
    setStudents(p => p.map(s => s.id === studentId ? {...s, balance:s.balance + delta} : s));
  };

  const saveStudent = (data) => {
    const edit = modal?.payload;
    if (edit) setStudents(p => p.map(s => s.id===edit.id ? {...s,...data} : s));
    else setStudents(p => [...p, {...data, id: Date.now(), balance:0}]);
    setModal(null);
  };
  const archiveStudent = (id, archived=true) => {
    setStudents(p => p.map(s=>s.id===id?{...s,archived}:s));
    if (archived) setGroups(p => p.map(g=>({...g,studentIds:g.studentIds.filter(x=>x!==id)})));
  };
  const delStudent = (id) => {
    const snapL=[...lessons],snapS=[...students],snapT=[...txs],snapG=[...groups];
    const student = students.find(s=>s.id===id);
    setStudents(p => p.filter(s=>s.id!==id));
    setGroups(p => p.map(g=>({...g,studentIds:g.studentIds.filter(x=>x!==id)})));
    triggerUndo(`${student?.name||'Ученик'} удалён`, snapL, snapS, snapT, snapG);
  };
  const saveGroup = (data) => {
    const edit = modal?.payload;
    if (edit) setGroups(p=>p.map(g=>g.id===edit.id?{...g,...data}:g));
    else setGroups(p=>[...p,{...data,id:Date.now()}]);
    setModal(null);
  };
  const delGroup  = (id) => {
    const snapG=[...groups];
    setGroups(p=>p.filter(g=>g.id!==id));
    if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
    setPendingUndo({label:'Группа удалена', restore:()=>setGroups(snapG)});
    undoTimerRef.current = setTimeout(()=>setPendingUndo(null),4000);
  };

  const saveTx = (data) => {
    const edit = modal?.type === 'transaction' ? modal?.payload : null;
    if (edit) {
      const nextTx = {...edit, ...data};
      setTxs(p=>p.map(tx=>tx.id===edit.id?nextTx:tx));
      applyBalanceDelta(edit.studentId, -txDelta(edit));
      applyBalanceDelta(nextTx.studentId, txDelta(nextTx));
    } else {
      const tx = {...data, id:Date.now()};
      setTxs(p=>[tx,...p]);
      applyBalanceDelta(data.studentId, txDelta(tx));
    }
    setModal(null);
  };

  const delTx = (tx) => {
    const snapS=[...students],snapT=[...txs];
    setTxs(p=>p.filter(t=>t.id!==tx.id));
    applyBalanceDelta(tx.studentId, -txDelta(tx));
    triggerUndo('Операция удалена', lessons, snapS, snapT);
  };

  const saveLesson = (data, editId=null, options={}) => {
    if (editId) {
      const editLesson = lessons.find(l=>l.id===editId);
      const patch = data[0];
      setLessons(p=>p.map(l=>{
        if (l.id === editId) return {...l,...patch};
        if (options.applySeries && editLesson?.seriesId && l.seriesId === editLesson.seriesId && l.status === 'planned') {
          return {...l, type:patch.type, targetId:patch.targetId, subject:patch.subject, time:patch.time};
        }
        return l;
      }));
    }
    else {
      const arr = Array.isArray(data)?data:[data];
      setLessons(p=>[...p,...arr.map((l,i)=>({...l,id:Date.now()+i,status:'planned'}))]);
    }
    setModal(null);
  };

  const rescheduleLesson = (lessonId, date, time) => {
    const lesson = lessons.find(l=>l.id===lessonId);
    if (!lesson) return;
    const newLesson = {
      ...lesson,
      id: Date.now(),
      date,
      time,
      status:'planned',
      attendance: undefined,
      rescheduledFrom: lesson.id,
      packageUse:{},
    };
    setLessons(p=>p.map(l=>l.id===lessonId?{...l,status:'rescheduled',rescheduledTo:newLesson.id}:l).concat(newLesson));
    setModal(null);
  };

  const savePackage = (studentId, lessonsCount, amount) => {
    setStudents(p=>p.map(s=>s.id===studentId?{...s,packageLessons:(s.packageLessons||0)+lessonsCount}:s));
    if (amount > 0) {
      const tx = {id:Date.now(),studentId,type:'payment',amount,date:getTodayDate(),comment:`Абонемент: ${lessonsCount} зан.`};
      setTxs(p=>[tx,...p]);
      applyBalanceDelta(studentId, amount);
    }
    setModal(null);
  };

  const delLesson = (id, e) => {
    if(e) e.stopPropagation();
    const snapL = [...lessons], snapS = [...students], snapT = [...txs];
    const lesson = lessons.find(l=>l.id===id);
    if (lesson?.status==='no_show') {
      removeNoShowCharges(id);
    } else if (lesson?.status==='completed') {
      const grp = lesson.type==='group' ? groups.find(g=>g.id===lesson.targetId) : null;
      const refunds=[]; const upd={};
      Object.entries(lesson.attendance||{}).forEach(([sid,pres])=>{
        if(!pres) return;
        const s = students.find(st=>st.id===Number(sid));
        if(!s) return;
        if (lesson.packageUse?.[s.id]) return;
        const rate = grp?.rateOverrides?.[s.id] ?? s.rate;
        refunds.push({id:Date.now()+Math.random(),studentId:s.id,type:'payment',amount:rate,date:getTodayDate(),comment:`Отмена: ${fmtDate(lesson.date)}`});
        upd[s.id] = (upd[s.id]||0) + rate;
      });
      if (refunds.length) setTxs(p=>[...refunds,...p]);
      setStudents(p=>p.map(s=>upd[s.id]!==undefined?{...s,balance:s.balance+upd[s.id]}:s));
    }
    setLessons(p=>p.filter(l=>l.id!==id));
    setModal(null);
    triggerUndo('Занятие удалено', snapL, snapS, snapT);
  };

  const chargeNoShow = (lesson) => {
    const already = txs.some(tx => tx.lessonId === lesson.id && tx.kind === 'no_show');
    if (already) return;
    const ls = getLessonStudents(lesson, students, groups);
    const charges = ls.map((s,i) => ({
      id: Date.now()+i+Math.random(),
      studentId:s.id,
      type:'charge',
      amount:getLessonRate(lesson, s, groups),
      date:getTodayDate(),
      comment:`Неявка: ${fmtDate(lesson.date)}`,
      lessonId:lesson.id,
      kind:'no_show',
    }));
    if (!charges.length) return;
    setTxs(p=>[...charges,...p]);
    setStudents(p=>p.map(s=>{
      const charge = charges.find(tx=>tx.studentId===s.id);
      return charge ? {...s,balance:s.balance-charge.amount} : s;
    }));
  };

  const removeNoShowCharges = (lessonId) => {
    const own = txs.filter(tx => tx.lessonId === lessonId && tx.kind === 'no_show');
    if (!own.length) return;
    setTxs(p=>p.filter(tx => !(tx.lessonId === lessonId && tx.kind === 'no_show')));
    setStudents(p=>p.map(s=>{
      const refund = own.filter(tx=>tx.studentId===s.id).reduce((sum,tx)=>sum+tx.amount,0);
      return refund ? {...s,balance:s.balance+refund} : s;
    }));
  };

  const removeLessonAttendanceTxs = (lessonId) => {
    const own = txs.filter(tx => tx.lessonId === lessonId && tx.kind === 'attendance');
    if (!own.length) return;
    setTxs(p=>p.filter(tx => !(tx.lessonId === lessonId && tx.kind === 'attendance')));
    setStudents(p=>p.map(s=>{
      const delta = own.filter(tx=>tx.studentId===s.id).reduce((sum,tx)=>sum - txDelta(tx),0);
      return delta ? {...s,balance:s.balance+delta} : s;
    }));
  };

  const setLessonStatus = (lessonId, status) => {
    const lesson = lessons.find(l=>l.id===lessonId);
    if (!lesson) return;
    if (lesson.status === 'no_show' && status !== 'no_show') removeNoShowCharges(lessonId);
    if (lesson.status === 'completed' && status !== 'completed') {
      removeLessonAttendanceTxs(lessonId);
      const pkgRefunds = Object.entries(lesson.packageUse || {}).filter(([,used])=>used).map(([sid])=>Number(sid));
      if (pkgRefunds.length) {
        setStudents(p=>p.map(s=>pkgRefunds.includes(s.id)?{...s,packageLessons:(s.packageLessons||0)+1}:s));
      }
    }
    if (status === 'no_show') chargeNoShow(lesson);
    const attendance = status === 'no_show'
      ? Object.fromEntries(getLessonStudents(lesson, students, groups).map(s=>[s.id,false]))
      : lesson.attendance;
    setLessons(p=>p.map(l=>l.id===lessonId?{...l,status,attendance,packageUse:status==='planned'?{}:(l.packageUse||{})}:l));
    setModal(null);
  };

  const saveAttendance = (lessonId, newAtt, meta={}) => {
    const lesson = lessons.find(l => l.id === lessonId);
    if (!lesson) return;
    if (lesson.status === 'no_show') removeNoShowCharges(lessonId);
    const ls = getLessonStudents(lesson, students, groups);

    // KEY: always compute diff from the OLD attendance state
    // For planned → completed: charge everyone who IS present now
    // For completed → edited: only charge/refund the DELTA (who changed status)
    const oldAtt = (lesson.status === 'completed' && lesson.attendance) ? lesson.attendance : {};
    const newTxs = [];
    const upd = {};
    const updPkg = {};
    const oldPackageUse = lesson.packageUse || {};
    const nextPackageUse = {...oldPackageUse};

    ls.forEach(s => {
      const was = !!oldAtt[s.id];
      const is  = !!newAtt[s.id];
      const packageAvailable = (s.packageLessons || 0) + (updPkg[s.id] || 0);
      if (lesson.status === 'planned') {
        // First time completing: charge only present students
        if (is) {
          if (packageAvailable > 0) {
            updPkg[s.id] = (updPkg[s.id] || 0) - 1;
            nextPackageUse[s.id] = true;
          } else {
            const rate = getLessonRate(lesson, s, groups);
            newTxs.push({id: Date.now()+Math.random(), studentId: s.id, type:'charge', amount: rate,
              date: getTodayDate(), comment: `Урок: ${fmtDate(lesson.date)}`, lessonId, kind:'attendance'});
            upd[s.id] = (upd[s.id] || 0) - rate;
            delete nextPackageUse[s.id];
          }
        }
      } else {
        // Already completed: only apply CHANGES
        if (was === is) return; // no change — skip entirely (prevents double-counting)
        const rate = getLessonRate(lesson, s, groups);
        if (was && !is) {
          if (oldPackageUse[s.id]) {
            updPkg[s.id] = (updPkg[s.id] || 0) + 1;
            delete nextPackageUse[s.id];
          } else {
            // Was present, now absent → refund
            newTxs.push({id: Date.now()+Math.random(), studentId: s.id, type:'payment', amount: rate,
              date: getTodayDate(), comment: `Возврат (отсутствовал): ${fmtDate(lesson.date)}`, lessonId, kind:'attendance'});
            upd[s.id] = (upd[s.id] || 0) + rate;
          }
        } else {
          if (packageAvailable > 0) {
            updPkg[s.id] = (updPkg[s.id] || 0) - 1;
            nextPackageUse[s.id] = true;
          } else {
            // Was absent, now present → charge
            newTxs.push({id: Date.now()+Math.random(), studentId: s.id, type:'charge', amount: rate,
              date: getTodayDate(), comment: `Доп. списание (пришёл): ${fmtDate(lesson.date)}`, lessonId, kind:'attendance'});
            upd[s.id] = (upd[s.id] || 0) - rate;
            delete nextPackageUse[s.id];
          }
        }
      }
    });

    if (newTxs.length) {
      setTxs(p => [...newTxs, ...p]);
    }
    setStudents(p => p.map(s => upd[s.id] !== undefined || updPkg[s.id] !== undefined
      ? {...s, balance: s.balance + (upd[s.id] || 0), packageLessons: Math.max(0, (s.packageLessons || 0) + (updPkg[s.id] || 0))}
      : s));
    setLessons(p => p.map(l => l.id === lessonId ? {...l, ...meta, status:'completed', attendance: newAtt, packageUse: nextPackageUse} : l));
    setModal(null);
  };

  const closeTodayLessons = () => {
    const now = new Date();
    const due = lessons.filter(l => l.status === 'planned' && l.date === getTodayDate() && new Date(`${l.date}T${l.time}`) <= now);
    if (!due.length) return;
    if (!confirm(`Закрыть прошедшие уроки за сегодня: ${due.length}? Все ученики будут отмечены присутствующими.`)) return;
    due.forEach(l => {
      const att = {};
      getLessonStudents(l, students, groups).forEach(s => { att[s.id] = true; });
      saveAttendance(l.id, att);
    });
  };

  const resetDemoData = () => {
    if (!confirm('Сбросить все данные к демо-набору? Текущие изменения сотрутся.')) return;
    const demo = cloneDemoState();
    localStorage.removeItem(STORAGE_KEY);
    setStudents(demo.students);
    setGroups(demo.groups);
    setLessons(demo.lessons);
    setTxs(demo.txs);
  };

  const exportCsv = () => {
    const header = ['date','student','type','amount','comment'];
    const rows = txs.map(tx => {
      const s = students.find(st=>st.id===tx.studentId);
      return [tx.date, s?.name || 'Удален', tx.type, tx.amount, tx.comment || '']
        .map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',');
    });
    const blob = new Blob([[header.join(','),...rows].join('\n')], {type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `tutor-finance-${getTodayDate()}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const exportJson = () => {
    const snapshot = { version: STORAGE_VERSION, exportedAt: new Date().toISOString(), students, groups, lessons, txs, settings };
    const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `tutor-backup-${getTodayDate()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importJson = () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!data.students || !data.lessons) { alert('Файл не распознан — нет данных об учениках или уроках'); return; }
          const date = data.exportedAt ? new Date(data.exportedAt).toLocaleString('ru-RU') : 'неизвестная дата';
          if (!confirm(`Загрузить бэкап от ${date}?\n\nТекущие данные будут полностью заменены.`)) return;
          setStudents(data.students || []);
          setGroups(data.groups || []);
          setLessons(data.lessons || []);
          setTxs(data.txs || []);
          if (data.settings) setSettings(data.settings);
        } catch { alert('Не удалось прочитать файл — возможно, он повреждён.'); }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  const exportSchedulePdf = (fromDate, toDate) => {
    const filtered = lessons
      .filter(l => l.date >= fromDate && l.date <= toDate)
      .sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));
    const getName = (l) => l.type==='group'
      ? (groups.find(g=>g.id===l.targetId)?.name || '?')
      : (students.find(s=>s.id===l.targetId)?.name || '?');
    const statusRu = (s) => LESSON_STATUS[s]?.label || s;
    const rows = filtered.map(l => `
      <tr>
        <td>${fmtDate(l.date)}</td>
        <td>${l.time}</td>
        <td>${getName(l)}</td>
        <td>${l.type==='group'?'Группа':'Инд.'}</td>
        <td>${l.subject||'—'}</td>
        <td>${statusRu(l.status)}</td>
        <td>${l.topic||'—'}</td>
      </tr>`).join('');
    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/>
    <title>Расписание ${fromDate} — ${toDate}</title>
    <style>
      body{font-family:Arial,sans-serif;font-size:12px;padding:20px;color:#111}
      h2{margin-bottom:16px}
      table{border-collapse:collapse;width:100%}
      th{background:#111;color:#fff;padding:8px 10px;text-align:left;font-size:11px}
      td{padding:7px 10px;border-bottom:1px solid #ddd;font-size:11px}
      tr:nth-child(even)td{background:#f9f9f9}
      @media print{body{padding:0}}
    </style></head><body>
    <h2>Расписание: ${fmtDate(fromDate)} — ${fmtDate(toDate)}</h2>
    <p style="color:#666;margin-bottom:12px">Всего занятий: ${filtered.length}</p>
    <table>
      <thead><tr>
        <th>Дата</th><th>Время</th><th>Ученик/Группа</th><th>Тип</th><th>Предмет</th><th>Статус</th><th>Тема</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </body></html>`;
    const w = window.open('','_blank');
    if (!w) return;
    w.document.write(html);
    w.document.close();
    w.focus();
    setTimeout(()=>{ w.print(); }, 400);
  };

  const toggleTheme = () => {
    setSettings(p => ({...p, theme:p.theme === 'dark' ? 'light' : 'dark'}));
  };

  const getLessonName = (l) => l.type==='group'
    ? groups.find(g=>g.id===l.targetId)?.name || '?'
    : students.find(s=>s.id===l.targetId)?.name || '?';

  // ── PAGES ──────────────────────────────────────────────────────────────────

  // TODAY PAGE
  const PageToday = () => {
    const todayLessons = lessons.filter(l=>l.date===getTodayDate()).sort((a,b)=>a.time.localeCompare(b.time));
    const activeStudents = students.filter(s=>!s.archived);
    const debt = activeStudents.filter(s=>s.balance<0).reduce((s,st)=>s+Math.abs(st.balance),0);
    const debtors = activeStudents.filter(s=>s.balance<0).length;
    const now = new Date();
    const plannedToday = todayLessons.filter(l=>l.status==='planned');
    const dueToday = plannedToday.filter(l=>new Date(`${l.date}T${l.time}`) <= now);
    const nextLesson = plannedToday.find(l=>new Date(`${l.date}T${l.time}`) > now) || plannedToday[0];
    const todayTxs = txs.filter(tx=>tx.date===getTodayDate());
    const earnedToday = todayTxs.filter(tx=>tx.type==='payment').reduce((s,tx)=>s+tx.amount,0);
    const chargedToday = todayTxs.filter(tx=>tx.type==='charge').reduce((s,tx)=>s+tx.amount,0);
    const futureLessons = lessons.filter(l=>l.status==='planned' && l.date >= getTodayDate());
    const attention = [
      ...activeStudents.filter(s=>s.balance<0).slice(0,4).map(s=>({kind:'Долг', text:`${s.name}: ${money(Math.abs(s.balance))}`, student:s})),
      ...activeStudents.filter(s=>(s.packageLessons||0)===1).slice(0,3).map(s=>({kind:'Абонемент', text:`${s.name}: остался 1 урок`, student:s})),
      ...activeStudents.filter(s=>!futureLessons.some(l=>getLessonStudents(l, students, groups).some(st=>st.id===s.id))).slice(0,3).map(s=>({kind:'Нет уроков', text:s.name, student:s})),
    ].slice(0,6);
    // Active lesson detection
    const currentLesson = todayLessons.find(l => {
      if (l.status !== 'planned') return false;
      const s = new Date(`${l.date}T${l.time}`).getTime();
      const e = s + (l.duration||60)*60000;
      return now.getTime() >= s && now.getTime() <= e;
    });

    return (
      <div>
        {/* Timer banner for active lesson */}
        {currentLesson && (
          <TimerBanner lesson={currentLesson} name={getLessonName(currentLesson)}
            onAttend={()=>setModal({type:'attendance',payload:currentLesson})}/>
        )}
        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
          <div>
            <div style={{fontFamily:'Unbounded,cursive',fontSize:11,color:'var(--text-sec)',textTransform:'uppercase',letterSpacing:'.05em'}}>
              {new Date().toLocaleDateString('ru-RU',{weekday:'long'})}
            </div>
            <div style={{fontFamily:'Unbounded,cursive',fontSize:28,fontWeight:900,lineHeight:1.1}}>
              {new Date().toLocaleDateString('ru-RU',{day:'numeric',month:'long'})}
            </div>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'flex-start'}}>
            <button className="btn btn-sm btn-white" title="Советы" style={{padding:'8px 10px'}} onClick={()=>setModal({type:'tips'})}>
              <IcoLightbulb size={16}/>
            </button>
          {debt > 0 && (
            <div style={{background:'var(--red)',border:'var(--border)',borderRadius:4,padding:'8px 12px',boxShadow:'var(--shadow)'}}>
              <div style={{fontFamily:'Unbounded,cursive',fontSize:9,color:'#fff',textTransform:'uppercase'}}>Долги</div>
              <div style={{fontFamily:'Unbounded,cursive',fontSize:16,fontWeight:900,color:'#fff'}}>{debt.toLocaleString()} ₽</div>
              <div style={{fontSize:10,color:'rgba(255,255,255,.8)'}}>{debtors} чел.</div>
            </div>
          )}
          <button className="btn btn-sm btn-white theme-toggle" onClick={toggleTheme} title={settings.theme==='dark'?'Светлая тема':'Тёмная тема'}>
            {settings.theme==='dark'?'☀':'☾'}
          </button>
          </div>
        </div>

        {/* Stats row */}
        <div className="stat-row">
          <div className="stat-card" style={{background:'var(--black)',color:'var(--yellow)'}}>
            <div className="stat-label" style={{color:'var(--text-muted)'}}>Уроков сегодня</div>
            <div className="stat-value">{todayLessons.length}</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Учеников</div>
            <div className="stat-value">{activeStudents.length}</div>
          </div>
        </div>

        <div className="card" style={{padding:12,marginBottom:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}}>
            <div style={{flex:1,minWidth:0}}>
              <div className="label">Закрытие дня</div>
              <div style={{fontSize:12,lineHeight:1.6}}>
                {nextLesson ? <>Следующий: <strong>{nextLesson.time}</strong> · {getLessonName(nextLesson)}</> : 'Все уроки на сегодня обработаны'}
              </div>
              <div style={{fontSize:11,color:'var(--text-sec)',marginTop:4}}>
                Оплаты: {money(earnedToday)} · списания: {money(chargedToday)}
              </div>
            </div>
            <button className={`btn btn-sm ${dueToday.length?'btn-green':'btn-white'}`} disabled={!dueToday.length} onClick={closeTodayLessons}>
              Закрыть {dueToday.length || ''}
            </button>
          </div>
        </div>

        {attention.length > 0 && (
          <div className="card" style={{padding:12,marginBottom:16}}>
            <div style={{fontFamily:'Unbounded,cursive',fontSize:12,fontWeight:900,marginBottom:8}}>ТРЕБУЕТ ВНИМАНИЯ</div>
            {attention.map((item,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 0',borderTop:i?'1px solid var(--border-light)':'none'}}>
                <span className={`badge ${item.kind==='Долг'?'badge-red':item.kind==='Абонемент'?'badge-yellow':'badge-green'}`}>{item.kind}</span>
                <div style={{fontSize:12,flex:1}}>{item.text}</div>
                <button className="btn btn-sm btn-white" onClick={()=>setModal({type:'message',payload:{student:item.student}})}>Текст</button>
              </div>
            ))}
          </div>
        )}

        {/* Today's lessons */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div style={{fontFamily:'Unbounded,cursive',fontSize:13,fontWeight:900}}>СЕГОДНЯ</div>
          <button className="btn btn-sm btn-black" onClick={()=>setModal({type:'lesson',payload:{date:getTodayDate()}})}>
            <IcoPlus size={14}/> Добавить
          </button>
        </div>

        {todayLessons.length === 0 ? (
          <div className="card" style={{padding:24,textAlign:'center'}}>
            <div style={{fontFamily:'Unbounded,cursive',fontSize:13,color:'var(--text-muted)',lineHeight:1.5}}>
              Уроков нет
            </div>
          </div>
        ) : todayLessons.map(l => (
          <LessonCard key={l.id} lesson={l} name={getLessonName(l)}
            onEdit={()=>setModal({type:'lesson',payload:{lesson:l}})}
            onAttend={()=>setModal({type:'attendance',payload:l})}
            onStatus={()=>setModal({type:'lessonStatus',payload:l})}
            onDelete={(e)=>delLesson(l.id,e)}
          />
        ))}

        {/* Upcoming (next 6 days) */}
        {(() => {
          const upcoming = [];
          for (let i=1;i<7;i++) {
            const d = new Date(); d.setDate(d.getDate()+i);
            const ds = localDateString(d);
            const ls = lessons.filter(l=>l.date===ds);
            if (ls.length) upcoming.push({date:ds,lessons:ls.sort((a,b)=>a.time.localeCompare(b.time))});
          }
          if (!upcoming.length) return null;
          return (
            <div style={{marginTop:20}}>
              <div style={{fontFamily:'Unbounded,cursive',fontSize:13,fontWeight:900,marginBottom:10}}>БЛИЖАЙШИЕ</div>
              {upcoming.map(({date,lessons:ls}) => (
                <div key={date} style={{marginBottom:8}}>
                  <div style={{fontFamily:'Unbounded,cursive',fontSize:10,color:'var(--text-sec)',marginBottom:6,textTransform:'uppercase'}}>
                    {new Date(date+'T00:00:00').toLocaleDateString('ru-RU',{weekday:'short',day:'numeric',month:'short'})}
                  </div>
                  {ls.map(l => (
                    <LessonCard key={l.id} lesson={l} name={getLessonName(l)} compact
                      onEdit={()=>setModal({type:'lesson',payload:{lesson:l}})}
                      onAttend={()=>setModal({type:'attendance',payload:l})}
                      onStatus={()=>setModal({type:'lessonStatus',payload:l})}
                      onDelete={(e)=>delLesson(l.id,e)}
                    />
                  ))}
                </div>
              ))}
            </div>
          );
        })()}
      </div>
    );
  };

  // SCHEDULE PAGE
  const PageSchedule = () => {
    const scheduleLessons = schedSubject === 'all'
      ? lessons
      : lessons.filter(l => getLessonSubject(l, groups) === schedSubject);

    const WeekView = () => {
      // Mon–Sun of selected week
      const getWeekDates = (offset) => {
        const today = new Date();
        const dow = today.getDay() || 7; // Mon=1..Sun=7
        const mon = new Date(today);
        mon.setDate(today.getDate() - dow + 1 + offset * 7);
        return Array.from({length:7}, (_,i) => {
          const d = new Date(mon); d.setDate(mon.getDate() + i);
          return localDateString(d);
        });
      };
      const weekDates = getWeekDates(weekOffset);
      const DAY_LABELS = ['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'];
      const today = getTodayDate();

      // All unique times in this week, sorted
      const weekLessons = scheduleLessons.filter(l => weekDates.includes(l.date));
      const allTimes = [...new Set(weekLessons.map(l=>l.time))].sort();

      // Week label
      const [wStart, wEnd] = [weekDates[0], weekDates[6]];
      const fmtShort = (ds) => new Date(ds+'T00:00:00').toLocaleDateString('ru-RU',{day:'numeric',month:'short'});

      const swipeRef = useSwipe(
        () => setWeekOffset(w=>w+1),
        () => setWeekOffset(w=>w-1)
      );

      // Mobile: selected day within week
      const [mobileDay, setMobileDay] = useState(() => {
        const todayIdx = weekDates.indexOf(today);
        return todayIdx >= 0 ? todayIdx : 0;
      });
      const mobileDayLessons = scheduleLessons
        .filter(l => l.date === weekDates[mobileDay])
        .sort((a,b) => a.time.localeCompare(b.time));

      return (
        <div ref={swipeRef} className="sched-swipe">
          {/* Week nav */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
            <button className="btn btn-sm btn-white" onClick={()=>setWeekOffset(w=>w-1)}><IcoChevL size={16}/></button>
            <div style={{textAlign:'center'}}>
              <div style={{fontFamily:'Unbounded,cursive',fontSize:11,fontWeight:900}}>
                {weekOffset===0 ? 'ЭТА НЕДЕЛЯ' : weekOffset===1 ? 'СЛЕДУЮЩАЯ' : weekOffset===-1 ? 'ПРОШЛАЯ' : `${weekOffset>0?'+':''}${weekOffset} НЕД.`}
              </div>
              <div style={{fontSize:10,color:'var(--text-sec)'}}>{fmtShort(wStart)} — {fmtShort(wEnd)}</div>
            </div>
            <button className="btn btn-sm btn-white" onClick={()=>setWeekOffset(w=>w+1)}><IcoChevR size={16}/></button>
          </div>

          {/* ══════ MOBILE: Day strip + card list ══════ */}
          <div className="sched-mobile">
            <div className="day-strip" style={{marginBottom:14}}>
              {weekDates.map((d, i) => {
                const isToday = d === today;
                const num = new Date(d+'T00:00:00').getDate();
                const dayCount = scheduleLessons.filter(l=>l.date===d).length;
                return (
                  <button key={d} className={`day-btn ${mobileDay===i?'active':''}`}
                    onClick={()=>setMobileDay(i)} style={{minWidth:44,position:'relative'}}>
                    <span className="day-btn-name">{DAY_LABELS[i]}</span>
                    <span className="day-btn-date">{num}</span>
                    {dayCount>0 && <div className="day-btn-dot" style={{background: isToday?'var(--yellow)':'var(--blue)'}}/>}
                  </button>
                );
              })}
            </div>
            {mobileDayLessons.length === 0 ? (
              <div className="card" style={{padding:24,textAlign:'center'}}>
                <div style={{fontFamily:'Unbounded,cursive',fontSize:12,color:'var(--text-muted)'}}>
                  Нет уроков · <span style={{cursor:'pointer',color:'var(--blue)'}} onClick={()=>setModal({type:'lesson',payload:{date:weekDates[mobileDay]}})}>+ добавить</span>
                </div>
              </div>
            ) : mobileDayLessons.map((l,idx) => (
              <LessonCard key={l.id} lesson={l} name={getLessonName(l)}
                onEdit={()=>setModal({type:'lesson',payload:{lesson:l}})}
                onAttend={()=>setModal({type:'attendance',payload:l})}
                onStatus={()=>setModal({type:'lessonStatus',payload:l})}
                onDelete={(e)=>delLesson(l.id,e)}
              />
            ))}
          </div>

          {/* ══════ DESKTOP: Table grid ══════ */}
          <div className="sched-desktop">
            <div style={{overflowX:'auto',marginLeft:-16,marginRight:-16,paddingLeft:16,paddingRight:16}}>
              <div style={{overflowX:'auto', marginLeft:-16, marginRight:-16}}>
                <table style={{borderCollapse:'separate', borderSpacing:4, minWidth:600, width:'100%', tableLayout:'fixed', paddingLeft:16, paddingRight:16, boxSizing:'border-box'}}>
                  <thead>
                    <tr>
                      <th style={{width:52}}/>
                      {weekDates.map((d, i) => {
                        const isToday = d === today;
                        const num = new Date(d+'T00:00:00').getDate();
                        return (
                          <th key={d} onClick={() => setSelDate(d)}
                            style={{
                              textAlign:'center', padding:'8px 4px', cursor:'pointer',
                              border:'var(--border)', borderRadius:4,
                              background: isToday ? 'var(--black)' : selDate===d ? 'var(--yellow)' : 'var(--white)',
                              color: isToday ? 'var(--yellow)' : 'var(--black)',
                              boxShadow:'var(--shadow)',
                              fontFamily:'Unbounded,cursive', fontWeight:900,
                            }}>
                            <div style={{fontSize:10}}>{DAY_LABELS[i]}</div>
                            <div style={{fontSize:18, lineHeight:1}}>{num}</div>
                          </th>
                        );
                      })}
                    </tr>
                  </thead>
                  <tbody>
                    {allTimes.length === 0 ? (
                      <tr><td colSpan={8}>
                        <div style={{textAlign:'center', padding:'32px 0', fontFamily:'Unbounded,cursive', fontSize:12, color:'var(--text-muted)', border:'2.5px dashed var(--border-dashed)', borderRadius:4}}>
                          Уроков на эту неделю нет
                        </div>
                      </td></tr>
                    ) : allTimes.map(time => {
                      const byDay = {};
                      weekDates.forEach((d, i) => {
                        byDay[i] = scheduleLessons.filter(l => l.date === d && l.time === time);
                      });
                      return (
                        <tr key={time}>
                          <td style={{
                            textAlign:'center', fontFamily:'Unbounded,cursive',
                            fontSize:11, fontWeight:700, color:'var(--text-sec)',
                            verticalAlign:'middle', padding:'2px 0', width:52,
                          }}>{time}</td>
                          {[0,1,2,3,4,5,6].map(di => {
                            const cell = byDay[di] || [];
                            if (cell.length === 0) {
                              return (
                                <td key={di} style={{padding:2, verticalAlign:'top'}}>
                                  <div onClick={() => setModal({type:'lesson', payload:{date: weekDates[di]}})}
                                    style={{minHeight:60, border:'1.5px dashed var(--border-dashed)', borderRadius:4, cursor:'pointer', transition:'background .15s'}}
                                    onMouseEnter={e=>e.currentTarget.style.background='var(--bg-subtle)'}
                                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}/>
                                </td>
                              );
                            }
                            return (
                              <td key={di} style={{padding:2, verticalAlign:'top'}}>
                                {cell.map(l => {
                                  const name = getLessonName(l);
                                  const shortName = name.split('(')[0].trim()
                                    .replace('История','Ист.').replace('Общество','Общ.');
                                  const done = isFinalLesson(l);
                                  const statusInfo = LESSON_STATUS[l.status] || LESSON_STATUS.planned;
                                  return (
                                    <div key={l.id}
                                      onClick={() => setModal({type:l.status==='planned'||l.status==='completed'?'attendance':'lessonStatus', payload:l})}
                                      style={{
                                        background: done ? 'var(--done-bg)' : l.type==='group' ? 'var(--blue)' : 'var(--yellow)',
                                        color: done ? 'var(--done-text)' : l.type==='group' ? '#fff' : 'var(--black)',
                                        border:'var(--border)', borderRadius:4,
                                        padding:'6px', fontSize:10,
                                        fontFamily:'Unbounded,cursive', fontWeight:700,
                                        lineHeight:1.3, cursor:'pointer',
                                        boxShadow: done ? 'none' : 'var(--shadow)',
                                        minHeight:60, display:'flex', flexDirection:'column',
                                        justifyContent:'space-between', marginBottom:2,
                                        position:'relative', transition:'transform .1s',
                                      }}
                                      onMouseEnter={e=>{if(!done)e.currentTarget.style.transform='translateY(-2px)'}}
                                      onMouseLeave={e=>e.currentTarget.style.transform='none'}>
                                      {(() => {
                                        const stList = getLessonStudents(l, students, groups);
                                        const hasDebt = stList.some(s=>s.balance<0);
                                        return hasDebt ? (
                                          <div title="Есть задолженность" style={{
                                            position:'absolute',top:3,right:3,
                                            width:7,height:7,borderRadius:'50%',
                                            background:'var(--red)',border:'1.5px solid rgba(0,0,0,.3)',
                                          }}/>
                                        ) : null;
                                      })()}
                                      <div style={{wordBreak:'break-word'}}>{shortName}</div>
                                      <div style={{fontSize:8,opacity:.8,display:'flex',justifyContent:'space-between'}}>
                                        <span>{statusInfo.short}</span>
                                        {l.duration && l.duration !== 60 && <span>{l.duration < 60 ? `${l.duration}м` : l.duration === 90 ? '1.5ч' : '2ч'}</span>}
                                      </div>
                                    </div>
                                  );
                                })}
                              </td>
                            );
                          })}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          {/* Selected day detail */}
          {selDate && weekDates.includes(selDate) && (() => {
            const dl = scheduleLessons.filter(l=>l.date===selDate).sort((a,b)=>a.time.localeCompare(b.time));
            const obj = new Date(selDate+'T00:00:00');
            return (
              <div style={{marginTop:16,border:'var(--border)',borderRadius:4,overflow:'hidden',boxShadow:'var(--shadow)'}}>
                <div style={{background:'var(--black)',color:'var(--yellow)',padding:'8px 12px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span style={{fontFamily:'Unbounded,cursive',fontSize:11,fontWeight:900}}>
                    {obj.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'}).toUpperCase()}
                  </span>
                  <button className="btn btn-sm" style={{padding:'4px 8px',fontSize:9,background:'var(--yellow)',color:'var(--black)',boxShadow:'none'}}
                    onClick={()=>setModal({type:'lesson',payload:{date:selDate}})}>
                    + УРОК
                  </button>
                </div>
                {dl.length === 0 ? (
                  <div style={{padding:'16px',textAlign:'center',fontFamily:'Unbounded,cursive',fontSize:11,color:'var(--text-muted)'}}>Нет занятий</div>
                ) : dl.map(l => {
                  const stList = getLessonStudents(l, students, groups);
                  const hasDebt = stList.some(s=>s.balance<0);
                  return (
                  <div key={l.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderTop:'1.5px solid var(--border-light)'}}>
                    <div style={{fontFamily:'Unbounded,cursive',fontSize:14,fontWeight:900,minWidth:48,color:isFinalLesson(l)?'var(--text-muted)':'var(--black)'}}>
                      <div>{l.time}</div>
                      {l.duration && l.duration !== 60 && <div style={{fontSize:9,fontWeight:400,color:'var(--text-sec)',marginTop:1}}>{l.duration < 60 ? `${l.duration}м` : l.duration === 90 ? '1.5ч' : '2ч'}</div>}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontFamily:'Unbounded,cursive',fontSize:10,fontWeight:700,lineHeight:1.3,color:isFinalLesson(l)?'var(--text-muted)':'var(--black)'}}>{getLessonName(l)}</div>
                      {hasDebt && <div style={{fontSize:9,color:'var(--red)',fontFamily:'Unbounded,cursive',fontWeight:700,marginTop:2}}>● ДОЛГ</div>}
                    </div>
                    {l.status==='planned' ? (
                      <button className="btn btn-sm btn-green" onClick={()=>setModal({type:'attendance',payload:l})}><IcoPlay size={13}/></button>
                    ) : l.status==='completed' ? (
                      <button className="btn btn-sm btn-white" onClick={()=>setModal({type:'attendance',payload:l})}><IcoCheck size={13}/></button>
                    ) : (
                      <button className="btn btn-sm btn-white" onClick={()=>setModal({type:'lessonStatus',payload:l})}>{LESSON_STATUS[l.status]?.short}</button>
                    )}
                    <button style={{background:'none',border:'none',cursor:'pointer',padding:4,color:'var(--text-muted)'}} onClick={()=>setModal({type:'lessonStatus',payload:l})}><IcoEdit size={15}/></button>
                    <button style={{background:'none',border:'none',cursor:'pointer',padding:4,color:'var(--text-muted)'}} onClick={(e)=>delLesson(l.id,e)}><IcoTrash size={15}/></button>
                  </div>
                  );
                })}
              </div>

  // FINANCE PAGE (with full analytics, deduplication-safe)
  const PageFinance = () => {
    const [finTab, setFinTab] = useState('control'); // 'control' | 'analytics'
    const [analyticsPeriod, setAnalyticsPeriod] = useState('current_month');
    const [txStudentFilter, setTxStudentFilter] = useState('all');
    const [txTypeFilter, setTxTypeFilter] = useState('all');

    const activeStudents = students.filter(s => !s.archived);
    const debt    = activeStudents.filter(s => s.balance < 0).reduce((s, st) => s + Math.abs(st.balance), 0);
    const prepaid = activeStudents.filter(s => s.balance > 0).reduce((s, st) => s + st.balance, 0);
    const debtors = activeStudents.filter(s => s.balance < 0).sort((a, b) => a.balance - b.balance);
    const lowPackages = students.filter(s => !s.archived && (s.packageLessons || 0) > 0 && (s.packageLessons || 0) <= 1);
    const historyTxs = txs.filter(tx => {
      if (txStudentFilter !== 'all' && tx.studentId !== Number(txStudentFilter)) return false;
      if (txTypeFilter !== 'all' && tx.type !== txTypeFilter) return false;
      return true;
    });

    // Safe quick-pay: only pays the exact outstanding debt (not arbitrary amount)
    const quickPay = (studentId) => {
      const s = students.find(st => st.id === studentId);
      if (!s || s.balance >= 0) return;
      saveTx({studentId, type:'payment', amount: Math.abs(s.balance), date: getTodayDate(), comment:'Быстрая оплата долга'});
    };

    // ── ANALYTICS ───────────────────────────────────────────────────────────
    const getPeriodBounds = (p) => {
      const now = new Date(); const y = now.getFullYear(), m = now.getMonth();
      if (p === 'current_month') return { start: new Date(y,m,1), end: new Date(y,m+1,0,23,59,59) };
      if (p === 'last_month')    return { start: new Date(y,m-1,1), end: new Date(y,m,0,23,59,59) };
      if (p === 'next_month')    return { start: new Date(y,m+1,1), end: new Date(y,m+2,0,23,59,59) };
      return { start: new Date(2000,0,1), end: new Date(2100,0,1) };
    };
    const bounds = getPeriodBounds(analyticsPeriod);
    const inBounds = (ds) => { const d = new Date(ds+'T00:00:00'); return d >= bounds.start && d <= bounds.end; };

    // All completed lessons
    const completedLessons = lessons.filter(l => l.status === 'completed' || l.status === 'no_show');
    const periodLessons    = lessons.filter(l => inBounds(l.date));
    const periodCompleted  = periodLessons.filter(l => l.status === 'completed' || l.status === 'no_show');
    const periodPlanned    = periodLessons.filter(l => l.status === 'planned');

    // Compute per-student stats across ALL time (for skip rate)
    const studentStats = useMemo(() => {
      const stats = {};
      students.forEach(s => { stats[s.id] = { scheduled: 0, attended: 0, skipped: 0, earned: 0, lost: 0 }; });
      completedLessons.forEach(lesson => {
        const grp = lesson.type === 'group' ? groups.find(g => g.id === lesson.targetId) : null;
        const ls = lesson.type === 'individual'
          ? [students.find(s => s.id === lesson.targetId)].filter(Boolean)
          : (grp?.studentIds.map(id => students.find(s => s.id === id)).filter(Boolean) || []);
        ls.forEach(s => {
          if (!stats[s.id]) return;
          const rate = grp?.rateOverrides?.[s.id] ?? s.rate;
          const present = lesson.status !== 'no_show' && lesson.attendance?.[s.id] !== false;
          stats[s.id].scheduled++;
          if (present) { stats[s.id].attended++; stats[s.id].earned += rate; }
          else          { stats[s.id].skipped++;  stats[s.id].lost   += rate; }
        });
      });
      return stats;
    }, [completedLessons, students, groups]);

    // Average skip rate across all students (weighted by scheduled lessons)
    const totalScheduled = Object.values(studentStats).reduce((s, v) => s + v.scheduled, 0);
    const totalSkipped   = Object.values(studentStats).reduce((s, v) => s + v.skipped, 0);
    const avgSkipRate    = totalScheduled > 0 ? totalSkipped / totalScheduled : 0;

    // Period income (actual from txs)
    const periodTxs        = txs.filter(tx => inBounds(tx.date));
    const actualPayments   = periodTxs.filter(tx => tx.type === 'payment').reduce((s, t) => s + t.amount, 0);
    const actualCharges    = periodTxs.filter(tx => tx.type === 'charge').reduce((s, t) => s + t.amount, 0);

    // Period earned from completed lessons (gross)
    let periodEarned = 0, periodLost = 0;
    periodCompleted.forEach(lesson => {
      const grp = lesson.type === 'group' ? groups.find(g => g.id === lesson.targetId) : null;
      const ls = lesson.type === 'individual'
        ? [students.find(s => s.id === lesson.targetId)].filter(Boolean)
        : (grp?.studentIds.map(id => students.find(s => s.id === id)).filter(Boolean) || []);
      ls.forEach(s => {
        const rate = grp?.rateOverrides?.[s.id] ?? s.rate;
        const present = lesson.status !== 'no_show' && lesson.attendance?.[s.id] !== false;
        if (present) periodEarned += rate;
        else         periodLost   += rate;
      });
    });

    // Projected income for planned lessons in period
    let projIdeal = 0, projRealistic = 0;
    periodPlanned.forEach(lesson => {
      const grp = lesson.type === 'group' ? groups.find(g => g.id === lesson.targetId) : null;
      const ls = lesson.type === 'individual'
        ? [students.find(s => s.id === lesson.targetId)].filter(Boolean)
        : (grp?.studentIds.map(id => students.find(s => s.id === id)).filter(Boolean) || []);
      ls.forEach(s => {
        const rate = grp?.rateOverrides?.[s.id] ?? s.rate;
        projIdeal     += rate;
        projRealistic += rate * (1 - avgSkipRate);
      });
    });

    const totalIdeal     = periodEarned + projIdeal;
    const totalRealistic = periodEarned + projRealistic;

    // Per-student table for period
    const studentPeriodStats = useMemo(() => {
      const st = {};
      students.forEach(s => { st[s.id] = { earned:0, lost:0, scheduled:0, attended:0 }; });
      periodCompleted.forEach(lesson => {
        const grp = lesson.type === 'group' ? groups.find(g => g.id === lesson.targetId) : null;
        const ls = lesson.type === 'individual'
          ? [students.find(s => s.id === lesson.targetId)].filter(Boolean)
          : (grp?.studentIds.map(id => students.find(s => s.id === id)).filter(Boolean) || []);
        ls.forEach(s => {
          if (!st[s.id]) return;
          const rate = grp?.rateOverrides?.[s.id] ?? s.rate;
          const present = lesson.status !== 'no_show' && lesson.attendance?.[s.id] !== false;
          st[s.id].scheduled++;
          if (present) { st[s.id].attended++; st[s.id].earned += rate; }
          else         { st[s.id].lost += rate; }
        });
      });
      return st;
    }, [periodCompleted, students, groups]);

    const studentRows = students
      .map(s => ({ ...s, ...studentPeriodStats[s.id] }))
      .filter(s => s.scheduled > 0)
      .sort((a, b) => b.earned - a.earned);

    const Stat = ({label, value, color, sub}) => (
      <div style={{border:'var(--border)',borderRadius:4,padding:'10px 12px',boxShadow:'var(--shadow)',background:color||'var(--white)'}}>
        <div style={{fontFamily:'Unbounded,cursive',fontSize:9,textTransform:'uppercase',letterSpacing:'.05em',color:color?'rgba(255,255,255,.7)':'var(--text-sec)',marginBottom:4}}>{label}</div>
        <div style={{fontFamily:'Unbounded,cursive',fontSize:18,fontWeight:900,color:color?'#fff':'var(--black)',lineHeight:1}}>{value}</div>
        {sub && <div style={{fontSize:10,color:color?'rgba(255,255,255,.7)':'var(--text-sec)',marginTop:3}}>{sub}</div>}

    const ControlTab = () => (
      <div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
          <Stat label="Долги" value={`${debt.toLocaleString()} ₽`} color="#FF2D2D" sub={`${debtors.length} чел.`}/>
          <Stat label="Предоплаты" value={`${prepaid.toLocaleString()} ₽`} color="#00C853"/>
        </div>

        {debtors.length > 0 && (
          <>
            <div style={{fontFamily:'Unbounded,cursive',fontSize:12,fontWeight:900,marginBottom:10}}>ДОЛЖНИКИ</div>
            {debtors.map(s => (
              <div key={s.id} style={{display:'flex',alignItems:'center',gap:10,padding:'12px',marginBottom:8,border:'2.5px solid var(--red)',borderRadius:4,background:'var(--bg-danger)',boxShadow:'3px 3px 0 var(--red)'}}>
                <div style={{flex:1}}>
                  <div style={{fontFamily:'Unbounded,cursive',fontWeight:900,fontSize:12}}>{s.name}</div>
                  <div style={{fontFamily:'Unbounded,cursive',fontSize:16,fontWeight:900,color:'var(--red)'}}>{s.balance} ₽</div>
                </div>
                <button className="btn btn-sm btn-green" onClick={() => quickPay(s.id)}>Оплатил</button>
              </div>
            ))}
          </>
        )}

        {lowPackages.length > 0 && (
          <>
            <div style={{fontFamily:'Unbounded,cursive',fontSize:12,fontWeight:900,marginBottom:10}}>АБОНЕМЕНТЫ НА ИСХОДЕ</div>
            {lowPackages.map(s => (
              <div key={s.id} style={{display:'flex',alignItems:'center',gap:10,padding:'12px',marginBottom:8,border:'2.5px solid #FFE500',borderRadius:4,background:'#fffde0',boxShadow:'3px 3px 0 #FFE500'}}>
                <div style={{flex:1}}>
                  <div style={{fontFamily:'Unbounded,cursive',fontWeight:900,fontSize:12}}>{s.name}</div>
                  <div style={{fontSize:11,color:'#666'}}>осталось {s.packageLessons} занятие</div>
                </div>
                <button className="btn btn-sm btn-blue" onClick={() => setModal({type:'package',payload:{student:s}})}>Пополнить</button>
              </div>
            ))}
          </>
        )}

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',margin:'16px 0 10px'}}>
          <div style={{fontFamily:'Unbounded,cursive',fontSize:12,fontWeight:900}}>ИСТОРИЯ</div>
          <button className="btn btn-sm btn-black" onClick={() => setModal({type:'transaction',payload:null})}><IcoPlus size={13}/> Операция</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:10}}>
          <select className="input" value={txStudentFilter} onChange={e=>setTxStudentFilter(e.target.value)} style={{fontSize:11,padding:'8px'}}>
            <option value="all">Все ученики</option>
            {students.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
          <select className="input" value={txTypeFilter} onChange={e=>setTxTypeFilter(e.target.value)} style={{fontSize:11,padding:'8px'}}>
            <option value="all">Все типы</option>
            <option value="payment">Оплаты</option>
            <option value="charge">Списания</option>
          </select>
        </div>
        {historyTxs.slice(0,50).map(tx => {
          const s = students.find(st => st.id === tx.studentId);
          return (
            <div key={tx.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,padding:'10px 0',borderBottom:'1.5px solid #e0e0e0'}}>
              <div>
                <div style={{fontWeight:700,fontSize:12}}>{s?.name || 'Удалён'}</div>
                <div style={{fontSize:10,color:'#888'}}>{fmtDate(tx.date)} · {tx.comment}</div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <div style={{fontFamily:'Unbounded,cursive',fontWeight:900,fontSize:14,color:tx.type==='payment'?'#00C853':'#FF2D2D',minWidth:72,textAlign:'right'}}>
                  {tx.type==='payment'?'+':'-'}{money(tx.amount)}
                </div>
                {!tx.lessonId && (
                  <>
                    <button style={{background:'none',border:'none',cursor:'pointer',padding:4}} onClick={()=>setModal({type:'transaction',payload:tx})}><IcoEdit size={15}/></button>
                    <button style={{background:'none',border:'none',cursor:'pointer',padding:4,color:'#999'}} onClick={()=>delTx(tx)}><IcoTrash size={15}/></button>
                  </>
                )}
              </div>
            </div>
          );
        })}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:14}}>
          <button className="btn btn-sm btn-white btn-full" onClick={exportCsv}>Экспорт CSV</button>
          <button className="btn btn-sm btn-red btn-full" onClick={resetDemoData}>Сброс демо</button>
        </div>
        <div style={{marginTop:8,padding:'12px',border:'2.5px solid #0a0a0a',borderRadius:4,background:'#fffde0',boxShadow:'3px 3px 0 #0a0a0a'}}>
          <div style={{fontFamily:'Unbounded,cursive',fontSize:10,fontWeight:900,marginBottom:4}}>💾 БЭКАП ДАННЫХ</div>
          <div style={{fontSize:11,color:'#666',marginBottom:10,lineHeight:1.5}}>Сохраняй бэкап раз в неделю — данные хранятся в браузере и могут пропасть при очистке кэша.</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <button className="btn btn-sm btn-black btn-full" onClick={exportJson}>⬇ Скачать бэкап</button>
            <button className="btn btn-sm btn-white btn-full" onClick={importJson}>⬆ Загрузить бэкап</button>
          </div>
        </div>
      </div>
    );

    const AnalyticsTab = () => (
      <div>
        {/* Period selector */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:16}}>
          {[['last_month','Прошлый мес.'],['current_month','Этот месяц'],['next_month','Следующий'],['all_time','Всё время']].map(([v,l]) => (
            <button key={v} onClick={() => setAnalyticsPeriod(v)}
              style={{fontFamily:'Unbounded,cursive',fontSize:9,fontWeight:700,padding:'8px 6px',border:'var(--border)',borderRadius:4,cursor:'pointer',
                background: analyticsPeriod===v ? 'var(--black)' : 'var(--white)',
                color: analyticsPeriod===v ? 'var(--yellow)' : 'var(--black)',
                boxShadow: analyticsPeriod===v ? 'none' : 'var(--shadow)'}}>
              {l}
            </button>
          ))}
        </div>

        {/* Key metrics */}
        <div style={{fontFamily:'Unbounded,cursive',fontSize:11,fontWeight:900,marginBottom:10}}>ИТОГ ПЕРИОДА</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
          <Stat label="Заработано" value={`${periodEarned.toLocaleString()} ₽`} color="#00C853"/>
          <Stat label="Потеряно на пропусках" value={`${periodLost.toLocaleString()} ₽`} color="#FF2D2D"/>
        </div>

        {/* Forecasts */}
        <div style={{fontFamily:'Unbounded,cursive',fontSize:11,fontWeight:900,marginBottom:10,marginTop:16}}>ПРОГНОЗ (оставшиеся {periodPlanned.length} уроков)</div>
        <div style={{marginBottom:8,border:'2.5px solid #0a0a0a',borderRadius:4,overflow:'hidden',boxShadow:'4px 4px 0 #0a0a0a'}}>
          <div style={{background:'#00C853',padding:'10px 14px'}}>
            <div style={{fontFamily:'Unbounded,cursive',fontSize:9,color:'rgba(0,0,0,.6)',textTransform:'uppercase'}}>Идеальный (все приходят)</div>
            <div style={{fontFamily:'Unbounded,cursive',fontSize:22,fontWeight:900}}>{projIdeal.toLocaleString()} ₽</div>
            <div style={{fontSize:10,color:'rgba(0,0,0,.6)'}}>Итого за период: {totalIdeal.toLocaleString()} ₽</div>
          </div>
          <div style={{background:'#FFE500',padding:'10px 14px',borderTop:'2.5px solid #0a0a0a'}}>
            <div style={{fontFamily:'Unbounded,cursive',fontSize:9,color:'rgba(0,0,0,.6)',textTransform:'uppercase'}}>Реалистичный (с учётом пропусков {Math.round(avgSkipRate*100)}%)</div>
            <div style={{fontFamily:'Unbounded,cursive',fontSize:22,fontWeight:900}}>{Math.round(projRealistic).toLocaleString()} ₽</div>
            <div style={{fontSize:10,color:'rgba(0,0,0,.6)'}}>Итого за период: {Math.round(totalRealistic).toLocaleString()} ₽</div>
          </div>
        </div>

        {/* Skip rate info */}
        <div style={{border:'2.5px solid #0a0a0a',borderRadius:4,padding:'10px 14px',marginBottom:16,background:'#f5f0e8',boxShadow:'3px 3px 0 #0a0a0a'}}>
          <div style={{fontFamily:'Unbounded,cursive',fontSize:10,fontWeight:900,marginBottom:6}}>СТАТИСТИКА ПРОПУСКОВ (все время)</div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:11,color:'var(--text-sec)'}}>{totalScheduled} занятий запланировано</div>
              <div style={{fontSize:11,color:'var(--text-sec)'}}>{totalSkipped} пропущено</div>
            </div>
            <div style={{fontFamily:'Unbounded,cursive',fontSize:28,fontWeight:900,color:avgSkipRate>0.2?'#FF2D2D':avgSkipRate>0.1?'#FF8C00':'#00C853'}}>
              {Math.round(avgSkipRate*100)}%
            </div>
          </div>
          {/* Bar */}
          <div style={{marginTop:10,height:10,background:'var(--border-light)',borderRadius:3,border:'1.5px solid var(--black)',overflow:'hidden'}}>
            <div style={{height:'100%',width:`${Math.min(avgSkipRate*100,100)}%`,background:avgSkipRate>0.2?'var(--red)':avgSkipRate>0.1?'#FF8C00':'var(--green)',transition:'width .3s'}}/>
          </div>
        </div>

        {/* Per-student breakdown */}
        <div style={{fontFamily:'Unbounded,cursive',fontSize:11,fontWeight:900,marginBottom:10}}>ПО УЧЕНИКАМ (период)</div>

        {/* ── SVG: Lesson load by day of week ── */}
        {(() => {
          const dayNames = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
          const dayCounts = [0,0,0,0,0,0,0];
          periodLessons.forEach(l => {
            let dow = new Date(l.date+'T00:00:00').getDay();
            dow = dow === 0 ? 6 : dow - 1;
            dayCounts[dow]++;
          });
          const max = Math.max(...dayCounts, 1);
          const barW = 28, gap = 8, h = 100;
          const svgW = dayNames.length * (barW + gap);
          return (
            <div style={{border:'var(--border)',borderRadius:4,padding:'12px',marginBottom:16,background:'var(--white)',boxShadow:'var(--shadow)'}}>
              <div style={{fontFamily:'Unbounded,cursive',fontSize:10,fontWeight:900,marginBottom:10}}>НАГРУЗКА ПО ДНЯМ</div>
              <svg width="100%" viewBox={`0 0 ${svgW} ${h+24}`} style={{display:'block'}}>
                {dayCounts.map((c, i) => {
                  const barH = (c / max) * h;
                  const x = i * (barW + gap);
                  const clr = i >= 5 ? 'var(--red)' : 'var(--blue)';
                  return (
                    <g key={i}>
                      <rect x={x} y={h - barH} width={barW} height={barH} rx={3} fill={clr} opacity={0.85}/>
                      <text x={x + barW/2} y={h - barH - 4} textAnchor="middle" fontSize="9" fontFamily="Unbounded,cursive" fontWeight="700" fill="var(--black)">{c || ''}</text>
                      <text x={x + barW/2} y={h + 14} textAnchor="middle" fontSize="9" fontFamily="Unbounded,cursive" fontWeight="700" fill="var(--text-sec)">{dayNames[i]}</text>
                    </g>
                  );
                })}
              </svg>
            </div>
          );
        })()}
        {studentRows.length === 0 ? (
          <div style={{textAlign:'center',padding:20,color:'var(--text-muted)',fontFamily:'Unbounded,cursive',fontSize:11}}>Нет данных за период</div>
        ) : studentRows.map(s => {
          const skipRate = s.scheduled > 0 ? s.skipped / s.scheduled : 0;
          const ownSkip  = studentStats[s.id];
          const allTimeSkip = ownSkip.scheduled > 0 ? ownSkip.skipped / ownSkip.scheduled : 0;
          return (
            <div key={s.id} style={{border:'var(--border)',borderRadius:4,padding:'10px 12px',marginBottom:8,boxShadow:'var(--shadow)',background:'var(--white)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                <div style={{fontFamily:'Unbounded,cursive',fontWeight:900,fontSize:12}}>{s.name}</div>
                <div style={{display:'flex',gap:6}}>
                  <span style={{fontFamily:'Unbounded,cursive',fontSize:11,fontWeight:900,color:'var(--green)'}}>{s.earned.toLocaleString()} ₽</span>
                  {s.lost > 0 && <span style={{fontFamily:'Unbounded,cursive',fontSize:11,fontWeight:900,color:'var(--red)'}}>-{s.lost.toLocaleString()} ₽</span>}
                </div>
              </div>
              <div style={{display:'flex',gap:6,fontSize:10,color:'var(--text-sec)',marginBottom:6}}>
                <span>{s.attended}/{s.scheduled} уроков</span>
                <span>·</span>
                <span style={{color:allTimeSkip>0.2?'var(--red)':allTimeSkip>0.1?'#FF8C00':'var(--green)',fontWeight:700}}>
                  пропуск {Math.round(allTimeSkip*100)}% (всё время)
                </span>
              </div>
              {/* Earned bar */}
              <div style={{height:6,background:'var(--border-light)',borderRadius:3,border:'1px solid var(--border-dashed)',overflow:'hidden'}}>
                <div style={{height:'100%',display:'flex'}}>
                  <div style={{width:`${s.scheduled>0?(s.attended/s.scheduled)*100:0}%`,background:'var(--green)',transition:'width .3s'}}/>
                  <div style={{flex:1,background:'var(--red)'}}/>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    );

    return (
      <div>
        <div className="page-title">Финансы</div>
        <div className="toggle-row" style={{marginBottom:16}}>
          <button className={`toggle-opt ${finTab==='control'?'active':''}`} onClick={()=>setFinTab('control')}>Контроль</button>
          <button className={`toggle-opt ${finTab==='analytics'?'active':''}`} onClick={()=>setFinTab('analytics')}>Аналитика</button>
        </div>
        {finTab==='control' ? <ControlTab/> : <AnalyticsTab/>}
      </div>
    );
  };

  if (!loaded) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100dvh',fontFamily:'Unbounded,cursive',fontSize:14}}>Загрузка...</div>;

  return (
    <div>
      <UndoToast pendingUndo={pendingUndo} onUndo={handleUndo}/>
      <div className="main">
        {tab==='today'    && <PageToday/>}
        {tab==='schedule' && <PageSchedule/>}
        {tab==='students' && <PageStudents/>}
        {tab==='finance'  && <PageFinance/>}
      </div>

      {/* FAB — expandable */}
      {(tab==='today'||tab==='schedule') && <>
        {fabOpen && <div className="fab-overlay" onClick={()=>setFabOpen(false)}/>}
        {fabOpen && (
          <div className="fab-menu">
            <div className="fab-item" style={{background:'var(--yellow)',color:'var(--black)'}}
              onClick={()=>{setFabOpen(false);setModal({type:'lesson',payload:{date:tab==='schedule'?selDate:getTodayDate()}});}}>
              <IcoCal size={16}/> Новый урок
            </div>
            <div className="fab-item" style={{background:'var(--green)',color:'var(--black)'}}
              onClick={()=>{setFabOpen(false);setModal({type:'student',payload:null});}}>
              <IcoUsers size={16}/> Новый ученик
            </div>
            <div className="fab-item" style={{background:'var(--blue)',color:'#fff'}}
              onClick={()=>{setFabOpen(false);setModal({type:'transaction',payload:null});}}>
              <IcoWallet size={16}/> Новая оплата
            </div>
          </div>
        )}
        <div className="fab" onClick={()=>setFabOpen(!fabOpen)}
          style={{transform:fabOpen?'rotate(45deg)':'none',transition:'transform .2s'}}>
          <IcoPlus size={28}/>
        </div>
      </>}

      {/* SEARCH */}
      {showSearch && (
        <SearchModal students={students} groups={groups} lessons={lessons}
          onClose={()=>setShowSearch(false)}
          onOpenStudent={s=>setModal({type:'studentDetail',payload:s})}
          onOpenGroup={g=>setModal({type:'groupDetail',payload:g})}
          onOpenLesson={l=>setModal({type:l.status==='planned'||l.status==='completed'?'attendance':'lessonStatus',payload:l})}
        />
      )}

      {/* NOTIFICATION DROPDOWN */}
      {showNotifs && (
        <div style={{position:'fixed',inset:0,zIndex:199}} onClick={()=>setShowNotifs(false)}>
          <div onClick={e=>e.stopPropagation()} style={{
            position:'fixed',right:16,top:60,width:300,maxHeight:400,overflowY:'auto',
            background:'var(--white)',border:'var(--border)',borderRadius:4,
            boxShadow:'var(--shadow-lg)',zIndex:200,padding:8
          }}>
            <div style={{fontFamily:'Unbounded,cursive',fontSize:10,fontWeight:900,padding:'8px 8px 4px',color:'var(--text-sec)'}}>УВЕДОМЛЕНИЯ</div>
            {notifications.length===0 ? (
              <div style={{padding:16,textAlign:'center',fontSize:12,color:'var(--text-muted)'}}>Всё отлично! 🎉</div>
            ) : notifications.map(n=>(
              <div key={n.id} style={{display:'flex',gap:10,alignItems:'center',padding:'8px',borderBottom:'1px solid var(--border-light)'}}>
                <span style={{fontSize:18}}>{n.icon}</span>
                <div><div style={{fontSize:12,fontWeight:600}}>{n.text}</div>{n.sub&&<div style={{fontSize:10,color:'var(--text-sec)'}}>{n.sub}</div>}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* NAV BAR */}
      <nav className="navbar">
        {[
          {id:'today',    icon:<IcoHome/>,    label:'Сегодня'},
          {id:'schedule', icon:<IcoCal/>,     label:'Расписание'},
          {id:'students', icon:<IcoUsers/>,   label:'Ученики'},
          {id:'finance',  icon:<IcoWallet/>,  label:'Финансы'},
        ].map(({id,icon,label}) => (
          <button key={id} className={`nav-btn ${tab===id?'active':''}`} onClick={()=>{setTab(id);setFabOpen(false);}}>
            {icon}<span>{label}</span>
          </button>
        ))}
        <button className="nav-btn" onClick={()=>setShowSearch(true)} title="Поиск">
          <IcoSearch size={20}/><span>Поиск</span>
        </button>
        <button className="nav-btn" onClick={()=>setShowNotifs(!showNotifs)} title="Уведомления" style={{position:'relative'}}>
          <IcoStar size={20}/>
          {notifications.length>0 && <span className="notif-dot"/>}
          <span>Ещё</span>
        </button>
      </nav>

      {/* MODALS */}
      {modal?.type==='lesson' && (
        <LessonModal
          students={students} groups={groups}
          initialDate={modal.payload?.date || getTodayDate()}
          initialStudentId={modal.payload?.studentId || null}
          lessonToEdit={modal.payload?.lesson || null}
          onClose={()=>setModal(null)}
          onSave={(data, options)=>saveLesson(data, modal.payload?.lesson?.id||null, options)}
        />
      )}
      {modal?.type==='attendance' && (
        <AttendanceModal lesson={modal.payload} students={students} groups={groups}
          onClose={()=>setModal(null)} onSave={saveAttendance}/>
      )}
      {modal?.type==='student' && (
        <StudentModal student={modal.payload} onClose={()=>setModal(null)} onSave={saveStudent}/>
      )}
      {modal?.type==='studentDetail' && (
        <StudentDetailModal student={modal.payload} students={students} lessons={lessons} txs={txs} groups={groups}
          onClose={()=>setModal(null)}
          onEdit={()=>setModal({type:'student',payload:modal.payload})}
          onPay={(studentId)=>{
            const s = students.find(st=>st.id===studentId);
            if (s?.balance < 0) saveTx({studentId,type:'payment',amount:Math.abs(s.balance),date:getTodayDate(),comment:'Оплата долга'});
          }}
          onLesson={(studentId)=>setModal({type:'lesson',payload:{date:getTodayDate(), studentId}})}
          onPackage={(student)=>setModal({type:'package',payload:{student}})}
          onMessage={(student)=>setModal({type:'message',payload:{student}})}
          onArchive={archiveStudent}
        />
      )}
      {modal?.type==='transaction' && (
        <TransactionModal tx={modal.payload} students={students} onClose={()=>setModal(null)} onSave={saveTx}/>
      )}
      {modal?.type==='group' && (
        <GroupModal group={modal.payload} students={students} onClose={()=>setModal(null)} onSave={saveGroup}/>
      )}
      {modal?.type==='groupDetail' && (
        <GroupDetailModal group={modal.payload} students={students} lessons={lessons}
          onClose={()=>setModal(null)}
          onEdit={()=>setModal({type:'group',payload:modal.payload})}
        />
      )}
      {modal?.type==='lessonStatus' && (
        <LessonStatusModal lesson={modal.payload} onClose={()=>setModal(null)} onStatus={setLessonStatus} onDelete={delLesson}
          onReschedule={(lesson)=>setModal({type:'reschedule',payload:{lesson}})}
          onMessage={(lesson)=>{
            const firstStudent = getLessonStudents(lesson, students, groups)[0];
            setModal({type:'message',payload:{student:firstStudent,lesson}});
          }}
        />
      )}
      {modal?.type==='package' && (
        <PackageModal student={modal.payload.student} onClose={()=>setModal(null)} onSave={savePackage}/>
      )}
      {modal?.type==='reschedule' && (
        <RescheduleModal lesson={modal.payload.lesson} onClose={()=>setModal(null)} onSave={rescheduleLesson}/>
      )}
      {modal?.type==='message' && modal.payload?.student && (
        <MessageModal
          student={modal.payload.student}
          lesson={modal.payload.lesson || null}
          groups={groups} lessons={lessons}
          templates={customTemplates}
          onSaveTemplate={setCustomTemplates}
          onClose={()=>setModal(null)}/>
      )}
      {modal?.type==='schedExport' && (
        <ScheduleExportModal lessons={lessons} onExport={exportSchedulePdf} onClose={()=>setModal(null)}/>
      )}
      {modal?.type==='tips' && (
        <TipsModal onClose={()=>setModal(null)}/>
      )}
    </div>
  );
}

// Shared LessonCard component
function LessonCard({ lesson, name, onEdit, onAttend, onStatus, onDelete, compact=false }) {
  const done = isFinalLesson(lesson);
  const statusInfo = LESSON_STATUS[lesson.status] || LESSON_STATUS.planned;
  return (
    <div className="lesson-card" style={{opacity:done ? .75 : 1}}>
      <div className="lesson-time" style={{background:done?'#333':'var(--black)',minWidth:compact?52:62,fontSize:compact?12:14}}>
        <span>{lesson.time}</span>
        {lesson.duration && lesson.duration !== 60 && (
          <span style={{fontSize:8,color:'#bbb',marginTop:1}}>{lesson.duration < 60 ? `${lesson.duration}м` : lesson.duration === 90 ? '1.5ч' : lesson.duration === 120 ? '2ч' : `${lesson.duration}м`}</span>
        )}
        {done && <span style={{fontSize:8,color:'#ddd',marginTop:2}}>{statusInfo.short}</span>}
      </div>
      <div className="lesson-body">
        <div className="lesson-name" style={{fontSize:compact?11:12}}>{name}</div>
        <div>
          <span className="lesson-tag" style={{background:lesson.type==='group'?'var(--blue)':'var(--yellow)',color:lesson.type==='group'?'#fff':'var(--black)'}}>
            {lesson.type==='group'?'Группа':'Инд.'}
          </span>
          <span className="lesson-tag" style={{marginLeft:5,background:subjectColor(lesson.subject || 'История'),color:(lesson.subject==='Общество'||lesson.subject==='Математика')?'var(--black)':'#fff'}}>
            {lesson.subject || 'История'}
          </span>
          {lesson.seriesId && <span className="lesson-tag" style={{marginLeft:5,background:'var(--white)',color:'var(--black)'}}>серия</span>}
          {lesson.homework && <span className="lesson-tag" style={{marginLeft:5,background:'var(--green)',color:'var(--black)'}}>ДЗ</span>}
          {lesson.status !== 'planned' && (
            <span className="lesson-tag" style={{marginLeft:5,background:statusInfo.color,color:'#fff'}}>{statusInfo.label}</span>
          )}
        </div>
      </div>
      <div className="lesson-actions">
        {lesson.status==='planned' ? (
          <button className="btn btn-sm btn-green" onClick={e=>{e.stopPropagation();onAttend();}}>
            <IcoPlay size={14}/>
          </button>
        ) : lesson.status==='completed' ? (
          <button className="btn btn-sm btn-white" onClick={e=>{e.stopPropagation();onAttend();}}>
            <IcoCheck size={14}/>
          </button>
        ) : (
          <button className="btn btn-sm btn-white" onClick={e=>{e.stopPropagation();onStatus();}}>
            {statusInfo.short}
          </button>
        )}
        <button style={{background:'none',border:'none',cursor:'pointer',padding:6,color:'#555'}} onClick={e=>{e.stopPropagation();onEdit();}}>
          <IcoEdit size={16}/>
        </button>
        <button style={{background:'none',border:'none',cursor:'pointer',padding:6,color:'#555'}} onClick={e=>{e.stopPropagation();onStatus();}}>
          <IcoRepeat size={16}/>
        </button>
        <button style={{background:'none',border:'none',cursor:'pointer',padding:6,color:'#999'}} onClick={onDelete}>
          <IcoTrash size={16}/>
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

// ── PWA: Service Worker Registration ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
